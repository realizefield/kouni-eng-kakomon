<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高認英語 第4問 攻略 | GAMBA</title>
<style>
:root{
  --bg:#fef9f3;
  --paper:#ffffff;
  --ink:#2b2b2b;
  --accent:#d94f4f;
  --accent2:#2c5f8d;
  --accent3:#e8a838;
  --soft:#f3ece1;
  --line:#d8cfc0;
  --hint:#fff5e0;
  --good:#3d8b5a;
  --shadow:0 2px 0 rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:"Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN","Yu Gothic",-apple-system,sans-serif;line-height:1.7;-webkit-text-size-adjust:100%}
body{padding:12px;max-width:780px;margin:0 auto;padding-bottom:80px}

header{background:linear-gradient(135deg,var(--accent2),#1a4870);color:#fff;padding:18px 16px;border-radius:14px;margin-bottom:14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
header::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;background:radial-gradient(circle,rgba(255,255,255,.12),transparent 70%);border-radius:50%}
header h1{font-size:1.25rem;font-weight:800;letter-spacing:.02em;margin-bottom:4px}
header p{font-size:.82rem;opacity:.92}
.badge{display:inline-block;background:var(--accent3);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:8px;font-weight:700;margin-right:6px}

.q-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.q-tab{flex:1;min-width:62px;padding:10px 6px;background:var(--paper);border:2px solid var(--line);border-radius:10px;font-weight:700;font-size:.82rem;cursor:pointer;text-align:center;transition:all .15s;color:var(--ink)}
.q-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.year-pick{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.year-pick button{flex:1;min-width:80px;padding:8px;background:var(--paper);border:1.5px solid var(--line);border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;color:var(--ink)}
.year-pick button.on{background:var(--accent2);color:#fff;border-color:var(--accent2)}

.qcard{background:var(--paper);border-radius:14px;padding:16px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:14px}
.topic{background:var(--soft);padding:6px 12px;border-radius:8px;display:inline-block;font-size:.78rem;font-weight:700;color:var(--accent2);margin-bottom:10px}

.q-instruction{font-size:.82rem;color:#666;margin-bottom:8px;background:#fffcf3;padding:8px 12px;border-radius:8px;border-left:3px solid var(--accent3);line-height:1.5}

.frame{font-size:.95rem;line-height:1.9;font-family:"Georgia",serif;padding:14px;background:#fdf8f0;border-radius:10px;border:1px dashed var(--line);margin-bottom:10px}
.frame .blank-area{display:inline-block;background:var(--hint);border:2px dashed var(--accent3);padding:4px 16px;border-radius:6px;font-weight:700;color:var(--accent3);min-width:80px;text-align:center;margin:0 4px;font-family:sans-serif}

.abc-group{margin-bottom:12px}
.abc-row{display:flex;gap:8px;align-items:flex-start;padding:10px 12px;background:#fafafa;border-radius:8px;margin-bottom:6px;font-family:"Georgia",serif;font-size:.92rem;line-height:1.6;border:1px solid var(--line)}
.abc-label{flex:none;background:var(--accent2);color:#fff;font-weight:800;width:28px;height:28px;border-radius:50%;text-align:center;line-height:28px;font-size:.85rem;font-family:sans-serif}
.abc-text{flex:1}
.abc-ja{display:none;font-family:"Hiragino Maru Gothic ProN",sans-serif;font-size:.82rem;color:#555;margin-top:4px;padding-top:4px;border-top:1px dashed var(--line)}
.abc-row.show-ja .abc-ja{display:block}

.toggle-ja{margin-bottom:10px;padding:6px 12px;background:var(--paper);border:1.5px solid var(--accent2);color:var(--accent2);border-radius:6px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit}

.sentence-play{background:linear-gradient(135deg,var(--accent),#b73e3e);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-weight:800;font-size:.85rem;cursor:pointer;box-shadow:0 2px 6px rgba(217,79,79,.3);display:flex;align-items:center;gap:8px;margin-bottom:10px;font-family:inherit}
.sentence-play:active{transform:scale(.98)}

.word{position:relative;border-bottom:2px dotted var(--accent2);cursor:help;color:var(--accent2);font-weight:600}
.word:hover, .word.tapped{background:#fff5d6}
.word-pop{position:absolute;left:50%;top:100%;transform:translateX(-50%);background:#2b2b2b;color:#fff;padding:8px 10px;border-radius:8px;font-size:.78rem;font-family:"Hiragino Maru Gothic ProN",sans-serif;font-weight:500;line-height:1.5;white-space:nowrap;z-index:50;display:none;margin-top:6px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.word-pop::before{content:"";position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-bottom-color:#2b2b2b}
.word-pop.show{display:block}
.word-pop .pop-row{display:flex;align-items:center;gap:8px;justify-content:space-between}
.word-pop .accent{color:#ffd166;font-weight:700}
.word-pop button{background:var(--accent3);color:#fff;border:none;border-radius:6px;padding:3px 8px;font-size:.72rem;cursor:pointer;font-family:inherit}
.word-pop button.save{background:var(--good)}
.word-pop button.saved{background:#888}
.word-pop button.speak{background:var(--accent2);font-size:.85rem;padding:3px 9px}
.word-pop button.speak:active{background:#1a4870}
.word-pop .pop-buttons{display:flex;gap:4px;flex-direction:column}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.choice{background:var(--paper);border:2px solid var(--line);border-radius:10px;padding:11px;font-size:.95rem;cursor:pointer;text-align:center;font-family:"Georgia",serif;color:var(--ink);transition:all .15s;line-height:1.4;font-weight:700}
.choice .num{display:inline-block;background:var(--soft);color:var(--accent2);font-weight:800;width:22px;height:22px;border-radius:50%;text-align:center;line-height:22px;margin-right:8px;font-size:.78rem;font-family:sans-serif;vertical-align:middle}
.choice.correct{background:#e8f5e9;border-color:var(--good)}
.choice.correct .num{background:var(--good);color:#fff}
.choice.wrong{background:#fde8e8;border-color:var(--accent);opacity:.85}
.choice.wrong .num{background:var(--accent);color:#fff}

.mode-tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:14px 0 10px}
.mode-btn{padding:10px 8px;border:2px solid var(--line);background:var(--paper);border-radius:10px;font-size:.78rem;font-weight:700;cursor:pointer;text-align:center;color:var(--ink);line-height:1.3}
.mode-btn.active{background:var(--accent3);color:#fff;border-color:var(--accent3)}

.mode-panel{background:var(--soft);padding:14px;border-radius:10px;margin-top:6px;display:none;border:1px solid var(--line)}
.mode-panel.show{display:block}
.mode-panel h3{font-size:.92rem;color:var(--accent2);margin-bottom:8px;border-left:4px solid var(--accent3);padding-left:8px}

.hint-buttons{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.hint-btn{flex:1;min-width:80px;padding:8px;background:var(--accent3);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:.8rem;cursor:pointer}
.hint-box{background:var(--paper);padding:10px 12px;border-left:4px solid var(--accent3);border-radius:6px;margin-bottom:6px;font-size:.88rem;line-height:1.6;display:none}
.hint-box.show{display:block;animation:slidein .25s}
.hint-box p{margin-bottom:6px}
.hint-box p:last-child{margin-bottom:0}

.hint-box .word-table{width:100%;border-collapse:collapse;margin:8px 0;background:var(--soft);border-radius:6px;overflow:hidden;font-size:.85rem}
.hint-box .word-table th{background:var(--accent2);color:#fff;padding:5px 8px;text-align:left;font-weight:700;font-size:.78rem}
.hint-box .word-table td{padding:5px 8px;border-bottom:1px solid var(--line)}
.hint-box .word-table tr:last-child td{border-bottom:none}
.hint-box .word-table .en{font-family:"Georgia",serif;font-weight:700;color:var(--accent2);width:40%}
.hint-box .word-table .ja{color:var(--ink)}
.hint-box .step{margin-top:8px;padding:8px 10px;background:#fff5e0;border-radius:6px;border-left:3px solid var(--accent3)}
.hint-box .think-arrow{color:var(--accent);font-weight:800;margin:0 4px}
.hint-box .strategy{margin-top:8px;padding:10px 12px;background:#e8f4ff;border-radius:6px;border-left:3px solid var(--accent2)}
.hint-box .strategy b{color:var(--accent2)}
.hint-box .ng-mark{color:var(--accent);font-weight:800}
.hint-box .ok-mark{color:var(--good);font-weight:800}
.hint-box .order-arrow{display:inline-block;background:var(--accent);color:#fff;padding:2px 8px;margin:0 4px;border-radius:4px;font-weight:800;font-size:.78rem;font-family:sans-serif}
.hint-box .signal-word{background:#fff5d6;padding:1px 6px;border-radius:4px;font-weight:800;color:var(--accent);font-family:"Georgia",serif}
@keyframes slidein{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.hint-num{font-weight:800;color:#fff;background:var(--accent);display:inline-block;padding:2px 10px;border-radius:6px;font-size:.78rem;margin-bottom:6px}

.explain-box{background:var(--paper);padding:14px;border-radius:8px;border-left:4px solid var(--accent3);font-size:.9rem;line-height:1.85}
.explain-box p{margin-bottom:10px}
.explain-box p:last-child{margin-bottom:0}
.explain-box b{color:var(--accent);background:#fff;padding:0 3px;border-radius:3px}
.explain-box .ja-trans{background:var(--hint);padding:8px 10px;border-radius:6px;margin-top:10px;border-left:3px solid var(--accent2)}
.explain-box .ja-trans b{color:var(--accent2);background:transparent;padding:0}
.explain-box .check-table{width:100%;border-collapse:collapse;margin:10px 0;background:#fafafa;border-radius:6px;overflow:hidden;font-size:.85rem}
.explain-box .check-table th{background:var(--accent2);color:#fff;padding:6px 8px;text-align:left;font-size:.78rem}
.explain-box .check-table td{padding:6px 8px;border-bottom:1px solid var(--line);background:#fff}
.explain-box .check-table tr:last-child td{border-bottom:none}
.explain-box .check-table .ng{color:var(--accent);font-weight:700}
.explain-box .check-table .ok{color:var(--good);font-weight:700}
.explain-box .order-flow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;background:#fffcf3;padding:10px;border-radius:6px;margin:10px 0;font-weight:700;justify-content:center}
.explain-box .order-flow .step-box{background:var(--accent2);color:#fff;padding:6px 12px;border-radius:6px;font-size:.85rem}
.explain-box .order-flow .arrow{color:var(--accent);font-weight:800;font-size:1.1rem}

.review-fab{position:fixed;bottom:14px;right:14px;background:var(--accent);color:#fff;border:none;border-radius:30px;padding:12px 16px;font-weight:800;font-size:.85rem;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:100}
.review-fab .count{background:#fff;color:var(--accent);border-radius:50%;padding:1px 7px;margin-left:6px;font-size:.75rem}
.review-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:14px}
.review-modal.show{display:flex}
.review-content{background:var(--paper);border-radius:14px;padding:18px;max-width:420px;width:100%;max-height:85vh;overflow-y:auto}
.review-content h2{color:var(--accent);font-size:1.05rem;margin-bottom:10px}
.review-card{background:var(--soft);padding:12px;border-radius:10px;margin-bottom:10px}
.review-word{font-size:1.1rem;font-weight:800;color:var(--accent2);margin-bottom:6px;font-family:"Georgia",serif}
.review-q{font-size:.85rem;margin-bottom:8px;color:#555}
.review-actions{display:flex;gap:6px;margin-top:8px}
.review-actions button{flex:1;padding:8px;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:.8rem;color:#fff}
.btn-remember{background:var(--good)}
.close-btn{background:#888;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;width:100%;margin-top:8px}

.result-msg{margin-top:10px;padding:12px;border-radius:8px;font-weight:700;text-align:center;display:none}
.result-msg.show{display:block}
.result-msg.ok{background:#e8f5e9;color:var(--good)}
.result-msg.ng{background:#fde8e8;color:var(--accent)}

.tip-banner{background:linear-gradient(135deg,#e8f4ff,#d4eaff);border:1px solid #a0c8e8;padding:10px 14px;border-radius:10px;font-size:.82rem;color:#1a4870;margin-bottom:12px;line-height:1.6}
.tip-banner b{color:var(--accent)}

/* ヒントモード冒頭の注意書き */
.hint-notice{background:#fff8e1;border:1px solid #ffd982;padding:10px 12px;border-radius:8px;font-size:.8rem;color:#806000;margin-bottom:10px;line-height:1.55}
.hint-notice b{color:#a05000}

/* 解説末尾の学習のすすめ */
.study-rec{background:linear-gradient(135deg,#f0f8e8,#dcefcd);border:1px solid #a5c97c;padding:12px 14px;border-radius:10px;font-size:.85rem;color:#3a5a1f;margin-top:14px;line-height:1.7}
.study-rec b{color:#2c4a14}
.study-rec h4{color:#2c4a14;margin-bottom:6px;font-size:.92rem}
.study-rec a{display:inline-block;background:#5a8a2c;color:#fff;padding:6px 12px;border-radius:6px;text-decoration:none;font-weight:700;font-size:.82rem;margin:4px 4px 0 0;font-family:inherit}
.study-rec a:hover{background:#3e6a14}

@media (max-width:480px){
  .choices{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<header>
  <h1>🔀 高認英語 第4問 攻略</h1>
  <p><span class="badge">文の並べ替え</span>つなぎ言葉と代名詞がカギ!</p>
</header>

<div class="tip-banner">
  💡 <b>このヒントの使い方</b><br>
  これは<b>「英語が苦手な方が 40点合格を取る」ための戦略的ヒント</b>です。<b>満点用ではありません</b>。確実に得点を伸ばすには、まず<b>中学英単語・中学英文法</b>を学んだうえで、このヒントを補助として使ってください。
</div>

<div class="year-pick" id="yearPick"></div>
<div class="q-tabs" id="qTabs"></div>
<div id="qContainer"></div>

<button class="review-fab" onclick="openReview()">📚 復習リスト<span class="count" id="reviewCount">0</span></button>

<div class="review-modal" id="reviewModal">
  <div class="review-content">
    <h2>📚 復習リスト</h2>
    <div id="reviewBody"></div>
    <button class="close-btn" onclick="closeReview()">閉じる</button>
  </div>
</div>

<script>
const QUESTIONS_DATA = {
  "R7-1": [
    {
      no:1, qNum:16, topic:"京都旅行と祇園祭",
      framePre:'If you are interested in visiting Kyoto, I recommend that you come during summer.',
      framePost:'This is why I believe summer is the best time to visit Kyoto.',
      framePreJa:"もしあなたが京都を訪れることに興味があるなら、夏に来ることをお勧めします。",
      framePostJa:"だから私は、夏が京都を訪れるのに一番よい時期だと思うのです。",
      sentences:{
        a:'The biggest reason is that you have a chance to enjoy its famous summer festival, the Gion Matsuri.',
        b:'In this event, you can see participants pull large floats around the city.',
        c:'You will be amazed by their beautiful decorations.'
      },
      sentencesJa:{
        a:"一番の理由は、有名な夏祭りの祇園祭を楽しむ機会があるということです。",
        b:"このイベントでは、参加者が大きな山車を町中で引いている様子を見ることができます。",
        c:"その美しい装飾には、きっと驚かされるでしょう。"
      },
      answer:1,
      orderLabels:["a→b→c","a→c→b","b→a→c","b→c→a","c→a→b","c→b→a"],
      keyWords:[
        {w:"interested in",mean:"〜に興味がある",kana:"インタレスティドイン",ac:"イン"},
        {w:"visiting",mean:"訪問する",kana:"ヴィズィティング",ac:"ヴィ"},
        {w:"recommend",mean:"勧める",kana:"レコメンド",ac:"メン"},
        {w:"summer",mean:"夏",kana:"サマー",ac:"サ"},
        {w:"biggest reason",mean:"一番の理由",kana:"ビゲストリーズン",ac:"ビ"},
        {w:"chance",mean:"機会",kana:"チャンス",ac:"チャ"},
        {w:"famous",mean:"有名な",kana:"フェイマス",ac:"フェイ"},
        {w:"festival",mean:"お祭り",kana:"フェスティヴァル",ac:"フェ"},
        {w:"event",mean:"行事・イベント",kana:"イヴェント",ac:"ヴェ"},
        {w:"participants",mean:"参加者",kana:"パーティスィパンツ",ac:"ティ"},
        {w:"pull",mean:"引く",kana:"プル",ac:"プ"},
        {w:"floats",mean:"山車",kana:"フロウツ",ac:"フロウ"},
        {w:"city",mean:"町",kana:"スィティ",ac:"ス"},
        {w:"amazed",mean:"驚いた",kana:"アメイズド",ac:"メイ"},
        {w:"decorations",mean:"装飾",kana:"デコレイションズ",ac:"レイ"}
      ],
      hints:[
        "<p>まずは a/b/c の各文の<b>カギの単語</b>だけ確認しましょう。並べ替えは「全部訳す」必要はありません。</p><table class='word-table'><tr><th>英語</th><th>意味</th></tr><tr><td class='en'>summer festival</td><td class='ja'>夏祭り</td></tr><tr><td class='en'>the Gion Matsuri</td><td class='ja'>祇園祭</td></tr><tr><td class='en'>biggest reason</td><td class='ja'>一番の理由</td></tr><tr><td class='en'>this event</td><td class='ja'>このイベント</td></tr><tr><td class='en'>participants</td><td class='ja'>参加者</td></tr><tr><td class='en'>floats</td><td class='ja'>山車（だし）</td></tr><tr><td class='en'>their beautiful decorations</td><td class='ja'>その美しい装飾</td></tr><tr><td class='en'>You will be amazed</td><td class='ja'>あなたは驚くでしょう</td></tr></table>",
        "<p>並べ替えで一番大切なのは <b>「指示語・代名詞のルール」</b> です。次の3つを覚えてください。</p><div class='strategy'><b>並べ替えの黄金ルール：</b><br>① <span class='signal-word'>this</span>（この）/ <span class='signal-word'>these</span>（これらの）/ <span class='signal-word'>that</span>（その）<span class='think-arrow'>→</span><b>前の文に出た名詞を指す</b><br>② <span class='signal-word'>their</span>（その）/ <span class='signal-word'>its</span>（その）/ <span class='signal-word'>it</span>（それ）<span class='think-arrow'>→</span><b>前の文に出た物を受ける</b><br>③ これらの言葉が含まれる文は <b>絶対に最初には来られません</b>。前に「指す相手」が必要だからです。</div><div class='step'>では a/b/c をもう一度見てください。<br><b>b</b> に <span class='signal-word'>In this event</span>（このイベント）があります。<span class='think-arrow'>→</span>この <b>this event</b> は<b>何のイベント</b>を指すでしょうか？</div><div class='step'><b>c</b> に <span class='signal-word'>their</span>（その）があります。<span class='think-arrow'>→</span>この <b>their</b> は<b>何の</b>を指すでしょうか？</div><p>この2つの問いに答えれば、<b>どの文がどの文の後に来るか</b>がわかります。</p>",

function highlightWord(text, words){
  if(!words || words.length===0) return text;
  const sorted = [...words].sort((a,b)=>b.w.length-a.w.length);
  let result = text;
  sorted.forEach((kw,i)=>{
    const safeWord = kw.w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`\\b(${safeWord})\\b`, 'i');
    if(result.match(regex)){
      const opts = JSON.stringify({m:kw.mean,k:kw.kana,a:kw.ac});
      const escapedOpts = opts.replace(/"/g, '&quot;');
      result = result.replace(regex, `<span class="word" data-opts="${escapedOpts}" onclick="showVwPop(this,event)">$1</span>`);
    }
  });
  return result;
}

function revealAnswer(picked, showMsg){
  const data = QUESTIONS_DATA[currentYear][currentQ];
  const ans = data.answer - 1;
  const choicesEl = document.getElementById('choicesBox');
  if(!choicesEl) return;
  const buttons = choicesEl.querySelectorAll('.choice');
  buttons.forEach((btn, i)=>{
    if(i===ans) btn.classList.add('correct');
    else if(i===picked) btn.classList.add('wrong');
  });
  if(showMsg){
    const msg = document.getElementById('resultMsg');
    if(picked===ans){
      msg.className = 'result-msg ok show';
      msg.textContent = '🎉 正解！';
    } else {
      msg.className = 'result-msg ng show';
      msg.textContent = `残念。正解は ${data.answer} 番（${data.orderLabels[ans]}）です。`;
    }
  }
}

let activeWordPop = null;
function showVwPop(el, ev){
  if(ev) ev.stopPropagation();
  if(activeWordPop && activeWordPop !== el){
    closeVwPop(activeWordPop);
  }
  if(el.classList.contains('tapped')){
    closeVwPop(el);
    return;
  }
  el.classList.add('tapped');
  const opts = JSON.parse(el.getAttribute('data-opts').replace(/&quot;/g,'"'));
  const word = el.textContent;
  
  const isSaved = savedWords.some(w=>w.w===word);
  
  const pop = document.createElement('span');
  pop.className = 'word-pop show';
  pop.innerHTML = `
    <div class="pop-row">
      <div>
        <div><b>${word}</b> [${opts.k}] ${opts.a?`<span class="accent">▶${opts.a}</span>`:''}</div>
        <div>${opts.m}</div>
      </div>
      <div class="pop-buttons">
        <button class="speak" onclick="event.stopPropagation();speakWord('${word.replace(/'/g,"\\'")}')">🔊</button>
        <button class="${isSaved?'saved':'save'}" onclick="event.stopPropagation();saveWord('${word.replace(/'/g,"\\'")}','${opts.m}','${opts.k}',this)">${isSaved?'✓':'保存'}</button>
      </div>
    </div>
  `;
  el.appendChild(pop);
  activeWordPop = el;
}

function speakWord(word){
  if(!('speechSynthesis' in window)){
    alert('お使いのブラウザは音声読み上げに対応していません');
    return;
  }
  // Stop any current speech
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  const v = pickVoice();
  if(v) u.voice = v;
  u.lang = 'en-US';
  u.rate = 0.85;
  u.pitch = 1.15; // 明るく聞こえるよう少し高め
  speechSynthesis.speak(u);
}

function closeVwPop(el){
  el.classList.remove('tapped');
  const pop = el.querySelector('.word-pop');
  if(pop) pop.remove();
  if(activeWordPop===el) activeWordPop = null;
}

document.addEventListener('click', (e)=>{
  if(activeWordPop && !activeWordPop.contains(e.target)){
    closeVwPop(activeWordPop);
  }
});

function saveWord(w, m, k, btn){
  if(savedWords.some(x=>x.w===w)){
    return;
  }
  const data = QUESTIONS_DATA[currentYear][currentQ];
  savedWords.push({w, m, k, year:currentYear, qNo:data.no});
  btn.textContent = '✓';
  btn.className = 'saved';
  document.getElementById('reviewCount').textContent = savedWords.length;
}

let voices = [];
let currentSpeech = null;

function loadVoices(){
  voices = window.speechSynthesis.getVoices();
}
if('speechSynthesis' in window){
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

function pickVoice(){
  if(voices.length===0) loadVoices();
  // 明るい声の女性ボイスを優先順位付きで選ぶ
  // 1. iOS/Mac: Samantha（明るい標準女性）、Karen（豪・明るい）
  // 2. Windows: Zira（明るい女性）
  // 3. Chrome: Google US English Female
  // 4. 名前に female / woman が付いているもの
  const priorityNames = [
    'Samantha',
    'Karen',
    'Zira',
    'Google US English',
    'Google UK English Female',
    'Microsoft Zira',
    'Allison',
    'Ava',
    'Susan'
  ];
  
  // 優先順位の高いボイスを順に探す
  for(const name of priorityNames){
    const v = voices.find(voice => 
      voice.name.includes(name) && /en-US|en-GB|en-AU/i.test(voice.lang)
    );
    if(v) return v;
  }
  
  // 名前に female や woman が含まれる英語ボイス
  const femaleByName = voices.find(v => 
    /en-US|en-GB|en-AU/i.test(v.lang) && /female|woman/i.test(v.name)
  );
  if(femaleByName) return femaleByName;
  
  // 男性ボイスを除外して英語ボイスを探す（明らかに男性名のものを避ける）
  const maleNames = /male|man|David|Daniel|Alex|Tom|James|Mark|George|Fred/i;
  const nonMaleEn = voices.find(v => 
    /en-US|en-GB|en-AU/i.test(v.lang) && !maleNames.test(v.name)
  );
  if(nonMaleEn) return nonMaleEn;
  
  // 最終フォールバック：何でもいいから英語ボイス
  return voices.find(v => /en/i.test(v.lang)) || voices[0];
}

function playSentence(){
  if(!('speechSynthesis' in window)){
    alert('お使いのブラウザは音声読み上げに対応していません');
    return;
  }
  stopAllPlay();
  const data = QUESTIONS_DATA[currentYear][currentQ];
  const ans = data.answer - 1;
  const labels = data.orderLabels[ans].split('→');
  const orderedSentences = labels.map(l => data.sentences[l]).join(' ');
  const fullText = data.framePre + ' ' + orderedSentences + ' ' + data.framePost;
  const cleanText = fullText.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
  
  const u = new SpeechSynthesisUtterance(cleanText);
  const v = pickVoice();
  if(v) u.voice = v;
  u.lang = 'en-US';
  u.rate = 0.9;
  u.pitch = 1.15; // 明るく聞こえるよう少し高め
  currentSpeech = u;
  speechSynthesis.speak(u);
}

function stopAllPlay(){
  if('speechSynthesis' in window){
    speechSynthesis.cancel();
  }
  currentSpeech = null;
}

function openReview(){
  const body = document.getElementById('reviewBody');
  if(savedWords.length===0){
    body.innerHTML = '<p style="text-align:center;color:#888;padding:20px">まだ単語が保存されていません。<br>英文中の<span style="color:var(--accent2);text-decoration:underline">下線つきの単語</span>をタップして「保存」ボタンを押してください。</p>';
  } else {
    body.innerHTML = savedWords.map((w,i)=>`
      <div class="review-card">
        <div class="review-word">${w.w}</div>
        <div class="review-q">[${w.k}] ${w.m}</div>
        <div style="font-size:.75rem;color:#888;">令和${w.year[1]}年 第${w.year[3]}回 問${w.qNo}より</div>
        <div class="review-actions">
          <button class="btn-remember" onclick="removeWord(${i})">✓ 覚えた</button>
        </div>
      </div>
    `).join('');
  }
  document.getElementById('reviewModal').classList.add('show');
}
function closeReview(){
  document.getElementById('reviewModal').classList.remove('show');
}
function removeWord(i){
  savedWords.splice(i, 1);
  document.getElementById('reviewCount').textContent = savedWords.length;
  openReview();
}

renderYearPick();
renderTabs();
renderQuestion();
</script>
