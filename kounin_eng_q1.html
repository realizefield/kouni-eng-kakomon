<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高認英語 第1問 攻略 v2 | GAMBA</title>
<style>
:root{
  --bg:#fef9f3;
  --paper:#ffffff;
  --ink:#2b2b2b;
  --accent:#d94f4f;
  --accent2:#2c5f8d;
  --accent3:#e8a838;
  --soft:#f3ece1;
  --line:#d8cfc0;
  --hint:#fff5e0;
  --good:#3d8b5a;
  --shadow:0 2px 0 rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:"Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN","Yu Gothic",-apple-system,sans-serif;line-height:1.7;-webkit-text-size-adjust:100%}
body{padding:12px;max-width:780px;margin:0 auto;padding-bottom:80px}

header{background:linear-gradient(135deg,var(--accent2),#1a4870);color:#fff;padding:18px 16px;border-radius:14px;margin-bottom:14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
header::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;background:radial-gradient(circle,rgba(255,255,255,.12),transparent 70%);border-radius:50%}
header h1{font-size:1.25rem;font-weight:800;letter-spacing:.02em;margin-bottom:4px}
header p{font-size:.82rem;opacity:.92}
.badge{display:inline-block;background:var(--accent3);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:8px;font-weight:700;margin-right:6px}

.q-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.q-tab{flex:1;min-width:62px;padding:10px 6px;background:var(--paper);border:2px solid var(--line);border-radius:10px;font-weight:700;font-size:.82rem;cursor:pointer;text-align:center;transition:all .15s;color:var(--ink)}
.q-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.year-pick{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.year-pick button{flex:1;min-width:80px;padding:8px;background:var(--paper);border:1.5px solid var(--line);border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;color:var(--ink)}
.year-pick button.on{background:var(--accent2);color:#fff;border-color:var(--accent2)}

.qcard{background:var(--paper);border-radius:14px;padding:16px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:14px}
.scene{background:var(--soft);padding:6px 12px;border-radius:8px;display:inline-block;font-size:.78rem;font-weight:700;color:var(--accent2);margin-bottom:10px}
.dialog{font-size:1rem;line-height:2;font-family:"Georgia",serif}
.dialog .line{margin:6px 0;padding:6px 8px;border-radius:6px;transition:background .25s}
.dialog .line.playing{background:#fff5d6;box-shadow:0 0 0 2px var(--accent3)}
.speaker{font-weight:800;color:var(--accent);margin-right:6px}
.line-play{display:inline-block;background:none;border:1px solid var(--line);border-radius:50%;width:26px;height:26px;font-size:.75rem;cursor:pointer;color:var(--accent2);margin-right:6px;padding:0;vertical-align:middle;line-height:24px}
.line-play:hover{background:var(--soft)}
.line-play:active{transform:scale(.92)}

/* 全文再生コントロール */
.play-all{background:linear-gradient(135deg,var(--accent),#b73e3e);color:#fff;border:none;border-radius:10px;padding:10px 14px;font-weight:800;font-size:.88rem;cursor:pointer;box-shadow:0 2px 6px rgba(217,79,79,.3);display:flex;align-items:center;gap:8px;margin-bottom:10px;width:100%;justify-content:center;font-family:inherit}
.play-all:active{transform:scale(.98)}
.play-all.playing{background:linear-gradient(135deg,#888,#666)}
.speed-control{display:flex;gap:4px;margin-bottom:10px;background:var(--soft);padding:4px;border-radius:8px}
.speed-control button{flex:1;padding:6px;background:transparent;border:none;border-radius:6px;font-size:.75rem;font-weight:700;cursor:pointer;color:var(--ink);font-family:inherit}
.speed-control button.on{background:var(--paper);color:var(--accent2);box-shadow:0 1px 2px rgba(0,0,0,.08)}
.blank{display:inline-block;background:var(--hint);border:2px dashed var(--accent3);padding:2px 28px;border-radius:6px;font-weight:700;color:var(--accent3);min-width:140px;text-align:center}

.word{position:relative;border-bottom:2px dotted var(--accent2);cursor:help;color:var(--accent2);font-weight:600}
.word:hover, .word.tapped{background:#fff5d6}
.word-pop{position:absolute;left:50%;top:100%;transform:translateX(-50%);background:#2b2b2b;color:#fff;padding:8px 10px;border-radius:8px;font-size:.78rem;font-family:"Hiragino Maru Gothic ProN",sans-serif;font-weight:500;line-height:1.5;white-space:nowrap;z-index:50;display:none;margin-top:6px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.word-pop::before{content:"";position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-bottom-color:#2b2b2b}
.word-pop.show{display:block}
.word-pop .pop-row{display:flex;align-items:center;gap:8px;justify-content:space-between}
.word-pop .accent{color:#ffd166;font-weight:700}
.word-pop button{background:var(--accent3);color:#fff;border:none;border-radius:6px;padding:3px 8px;font-size:.72rem;cursor:pointer;font-family:inherit}
.word-pop button.save{background:var(--good)}
.word-pop button.saved{background:#888}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.choice{background:var(--paper);border:2px solid var(--line);border-radius:10px;padding:10px;font-size:.88rem;cursor:pointer;text-align:left;font-family:"Georgia",serif;color:var(--ink);transition:all .15s;line-height:1.4;display:block;width:100%}
.choice .num{display:inline-block;background:var(--soft);color:var(--accent2);font-weight:800;width:22px;height:22px;border-radius:50%;text-align:center;line-height:22px;margin-right:6px;font-size:.78rem;font-family:sans-serif}
.choice.correct{background:#e8f5e9;border-color:var(--good)}
.choice.correct .num{background:var(--good);color:#fff}
.choice.wrong{background:#fde8e8;border-color:var(--accent);opacity:.85}
.choice.wrong .num{background:var(--accent);color:#fff}
.choice .ja-row{display:none;margin-top:8px;padding-top:8px;border-top:1px dashed rgba(0,0,0,.15);font-family:"Hiragino Maru Gothic ProN",sans-serif;font-size:.82rem;color:#444;align-items:center;gap:8px}
.choices.revealed .choice .ja-row{display:flex}
.choice .ja-text{flex:1;line-height:1.5}
.choice .ja-icon{color:var(--accent2);font-weight:800;font-family:sans-serif}
.choice-spk{background:var(--accent2);color:#fff;border:none;border-radius:6px;padding:4px 8px;font-size:.7rem;cursor:pointer;font-family:inherit;font-weight:700;flex-shrink:0}
.choice-spk:active{transform:scale(.94)}

.mode-tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:14px 0 10px}
.mode-btn{padding:10px 8px;border:2px solid var(--line);background:var(--paper);border-radius:10px;font-size:.78rem;font-weight:700;cursor:pointer;text-align:center;color:var(--ink);line-height:1.3}
.mode-btn.active{background:var(--accent3);color:#fff;border-color:var(--accent3)}

.mode-panel{background:var(--soft);padding:14px;border-radius:10px;margin-top:6px;display:none;border:1px solid var(--line)}
.mode-panel.show{display:block}
.mode-panel h3{font-size:.92rem;color:var(--accent2);margin-bottom:8px;border-left:4px solid var(--accent3);padding-left:8px}

.hint-buttons{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.hint-btn{flex:1;min-width:80px;padding:8px;background:var(--accent3);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:.8rem;cursor:pointer}
.hint-box{background:var(--paper);padding:10px 12px;border-left:4px solid var(--accent3);border-radius:6px;margin-bottom:6px;font-size:.88rem;line-height:1.6;display:none}
.hint-box.show{display:block;animation:slidein .25s}
.hint-box p{margin-bottom:6px}
.hint-box p:last-child{margin-bottom:0}

/* ヒント内の単語表 */
.hint-box .word-table{width:100%;border-collapse:collapse;margin:8px 0;background:var(--soft);border-radius:6px;overflow:hidden;font-size:.85rem}
.hint-box .word-table th{background:var(--accent2);color:#fff;padding:5px 8px;text-align:left;font-weight:700;font-size:.78rem}
.hint-box .word-table td{padding:5px 8px;border-bottom:1px solid var(--line)}
.hint-box .word-table tr:last-child td{border-bottom:none}
.hint-box .word-table .en{font-family:"Georgia",serif;font-weight:700;color:var(--accent2);width:40%}
.hint-box .word-table .ja{color:var(--ink)}
.hint-box .step{margin-top:8px;padding:8px 10px;background:#fff5e0;border-radius:6px;border-left:3px solid var(--accent3)}
.hint-box .think-arrow{color:var(--accent);font-weight:800;margin:0 4px}
@keyframes slidein{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.hint-num{font-weight:800;color:#fff;background:var(--accent);display:inline-block;padding:2px 10px;border-radius:6px;font-size:.78rem;margin-bottom:6px}

.struct-line{background:var(--paper);padding:12px;border-radius:8px;margin-bottom:10px;border:1px solid var(--line)}
.struct-en{font-family:"Georgia",serif;font-size:.95rem;line-height:1.6;margin-bottom:8px;padding-bottom:8px;border-bottom:1px dashed var(--line)}
.struct-buttons{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.struct-buttons button{padding:6px 12px;background:var(--accent2);color:#fff;border:none;border-radius:6px;font-size:.78rem;cursor:pointer;font-weight:700}
.struct-buttons button.spk{background:var(--accent)}
.struct-buttons button.expl{background:var(--accent3)}
.struct-detail{margin-top:6px;padding:10px 12px;background:var(--hint);border-radius:8px;font-size:.86rem;display:none;line-height:1.7;border-left:4px solid var(--accent3)}
.struct-detail.show{display:block;animation:slidein .25s}
.struct-detail .ja{font-weight:700;color:var(--accent2)}
.struct-detail .expl-body p{margin-bottom:8px}
.struct-detail .expl-body p:last-child{margin-bottom:0}
.struct-detail .expl-body b{color:var(--accent);background:#fff;padding:0 3px;border-radius:3px}

.review-fab{position:fixed;bottom:14px;right:14px;background:var(--accent);color:#fff;border:none;border-radius:30px;padding:12px 16px;font-weight:800;font-size:.85rem;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:100}
.review-fab .count{background:#fff;color:var(--accent);border-radius:50%;padding:1px 7px;margin-left:6px;font-size:.75rem}
.review-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:14px}
.review-modal.show{display:flex}
.review-content{background:var(--paper);border-radius:14px;padding:18px;max-width:420px;width:100%;max-height:85vh;overflow-y:auto}
.review-content h2{color:var(--accent);font-size:1.05rem;margin-bottom:10px}
.review-card{background:var(--soft);padding:12px;border-radius:10px;margin-bottom:10px}
.review-word{font-size:1.1rem;font-weight:800;color:var(--accent2);margin-bottom:6px;font-family:"Georgia",serif}
.review-q{font-size:.85rem;margin-bottom:8px;color:#555}
.review-choices{display:grid;gap:6px}
.review-choice{background:var(--paper);border:1.5px solid var(--line);padding:8px;border-radius:6px;font-size:.85rem;cursor:pointer;text-align:left;color:var(--ink)}
.review-choice.right{background:#e8f5e9;border-color:var(--good)}
.review-choice.bad{background:#fde8e8;border-color:var(--accent)}
.review-actions{display:flex;gap:6px;margin-top:8px}
.review-actions button{flex:1;padding:8px;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:.8rem;color:#fff}
.btn-remember{background:var(--good)}
.close-btn{background:#888;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;width:100%;margin-top:8px}

.result-msg{margin-top:10px;padding:12px;border-radius:8px;font-weight:700;text-align:center;display:none}
.result-msg.show{display:block}
.result-msg.ok{background:#e8f5e9;color:var(--good)}
.result-msg.ng{background:#fde8e8;color:var(--accent)}

@media (max-width:480px){
  .choices{grid-template-columns:1fr}
  .mode-tabs{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <h1>🎯 高認英語 第1問 攻略 v2</h1>
  <p><span class="badge">対話文穴埋め</span>R6年新形式対応 ・ 詳しい1文ごと解説つき</p>
</header>

<div class="year-pick" id="yearPick"></div>
<div class="q-tabs" id="qTabs"></div>
<div id="qContainer"></div>

<button class="review-fab" onclick="openReview()">📚 復習リスト<span class="count" id="reviewCount">0</span></button>

<div class="review-modal" id="reviewModal">
  <div class="review-content">
    <h2>📚 復習リスト</h2>
    <div id="reviewBody"></div>
    <button class="close-btn" onclick="closeReview()">閉じる</button>
  </div>
</div>

<script>
const QUESTIONS_DATA = {
  "R7-1": [
    {
      no:1, scene:"At home", answer:4,
      lines:[
        {sp:"A", text:"Look! It's snowing.", ja:"見て！雪が降っているよ。",
         explain:"<p>まず <b>Look!</b> は「見て！」という呼びかけです。文の最初に動詞がきているので、これは<b>命令文</b>といって、相手に何かをしてほしいときの形です。</p><p>次の <b>It's snowing.</b> は「雪が降っています」という意味です。ここで気をつけたいのは、<b>It は「それ」と訳さない</b>ということです。天気・時間・季節などを言うときの英語では、文の主語に意味のない「it」を置くルールがあります。日本語に訳すときは「それ」を出さずに「雪が降っています」と訳します。</p><p><b>snowing</b> は <b>snow（雪が降る）</b>という動詞に <b>-ing</b> がついた形です。<b>be動詞 + 〜ing</b> の形を<b>進行形</b>といって、「今〜している最中」という意味を表します。ここでは「ちょうど今、雪が降っている」ということを伝えています。</p>"},
        {sp:"B", text:"Nice. Why don't we go outside?", ja:"いいね。外に行かない？",
         explain:"<p><b>Nice.</b> は「いいね」という相づちです。短く反応するときによく使います。</p><p><b>Why don't we 〜?</b> は形は「なぜ〜しないの？」と見えますが、本当の意味は「<b>〜しませんか？</b>」という<b>誘いの表現</b>です。相手を何かに誘いたいときに使う、決まった言い方として覚えてください。たとえば <b>Why don't we go shopping?</b> なら「買い物に行かない？」となります。</p><p><b>go outside</b> は <b>go（行く）</b>と <b>outside（外へ）</b>を組み合わせて「外へ行く」という意味です。</p><p>つまりこの文は、Bが「外に出て雪を見ない？」とAを誘っている場面です。</p>"},
        {sp:"A", text:"___ It's a little too cold for me.", ja:"___　私には少し寒すぎます。", blank:true,
         explain:"<p>空所のあとの <b>It's a little too cold for me.</b> がポイントです。</p><p><b>a little</b> は「少し」、<b>too 〜</b> は「<b>〜すぎる</b>」という<b>マイナスの意味</b>を表します。<b>too cold</b> で「寒すぎる」となり、<b>for me</b> は「私にとって」という意味です。</p><p>全部つなげると「私にとっては少し寒すぎます」となります。つまりAは、Bからの「外に行こう」という誘いを<b>断る理由</b>を述べているのです。</p><p>ということは、空所には「断る言葉」が入ります。選択肢の中で「断る表現」は <b>No, thanks.（いや、結構です）</b>だけです。</p>"},
        {sp:"B", text:"Alright. Then, I'll go by myself.", ja:"わかった。じゃあ一人で行くよ。",
         explain:"<p><b>Alright.</b> は <b>All right.</b> と同じで、「わかった」「了解」という意味です。</p><p><b>Then</b> は「それなら・じゃあ」という意味で、前の話を受けて次に進むときに使います。</p><p><b>I'll</b> は <b>I will</b> の短縮形で、「私は〜するつもりだ」という<b>これからの予定</b>を表します。</p><p><b>by myself</b> は<b>「自分一人で」</b>という意味の決まった言い方です。<b>by 〜self</b> の形で覚えてください。たとえば <b>by yourself</b> なら「あなた一人で」、<b>by himself</b> なら「彼一人で」です。</p><p>この文でBは「Aが来ないなら、自分一人で外に行きます」と言っています。これも、Aが誘いを<b>断った</b>からこそ出てくる返事です。</p>"}
      ],
      choices:[
        {t:"That's true.", ja:"その通りだね。"},
        {t:"I agree.", ja:"賛成だよ。"},
        {t:"Sounds wonderful.", ja:"素敵だね。"},
        {t:"No, thanks.", ja:"いや、結構です。"}
      ],
      keyWords:[
        {w:"snowing",mean:"雪が降っている",kana:"スノーイング",ac:"スノー"},
        {w:"outside",mean:"外へ",kana:"アウトサイド",ac:"サイ"},
        {w:"cold",mean:"寒い",kana:"コウルド",ac:"コウ"},
        {w:"myself",mean:"自分自身で",kana:"マイセルフ",ac:"セ"}
      ],
      hints:[
        "<p>知っている単語を拾ってみましょう。</p><table class='word-table'><tr><th>英語</th><th>意味</th></tr><tr><td class='en'>at home</td><td class='ja'>家で</td></tr><tr><td class='en'>snowing</td><td class='ja'>雪が降っている</td></tr><tr><td class='en'>outside</td><td class='ja'>外</td></tr><tr><td class='en'>cold</td><td class='ja'>寒い</td></tr><tr><td class='en'>by myself</td><td class='ja'>自分で・一人で</td></tr></table><p>これらの単語から想像してみてください。</p><div class='step'>Bさんが <b>Why don't we go outside?</b> と聞いていますね。<br><b>why</b> は「どうして」だから……<span class='think-arrow'>→</span>「<b>どうして外に行かないの?</b>」と聞いていることになります。</div><div class='step'>つまりBさんは外に行こうと<b>誘っている</b>のです。それに対してAさんは <b>It's a little too cold for me.（私には少し寒すぎます）</b>と言っています。<br><b>cold（寒い）</b>という単語から、Aさんは外に行きたくないと感じていることがわかりますね。</div>",
        "Bが「Alright（わかった）。じゃあ一人で行く」と言っている → AはBの誘いを<b>断った</b>のですね。",
        "選択肢を見てみましょう。1〜3は<b>賛成・同意</b>の表現です。<br>誘いを<b>断る</b>表現はどれでしょうか？"
      ],
      think:"場面読み→空所の<b>前後</b>を確認→「寒すぎる」「一人で行く」から断ったと判断→「No, thanks.」を選ぶ。"
    },
    {
      no:2, scene:"At a station", answer:4,
      lines:[
        {sp:"A", text:"Excuse me. What time will the next train arrive at the airport?", ja:"すみません。次の電車は何時に空港に着きますか？",
         explain:"<p><b>Excuse me.</b> は知らない人に話しかけるときの「すみません」です。「ごめんなさい」という謝罪の意味ではありません。</p><p><b>What time will 〜?</b> は「<b>何時に〜しますか？</b>」とたずねる形です。<b>will</b> は「〜するでしょう」という未来を表す言葉です。</p><p><b>arrive at 〜</b> は<b>「〜に到着する」</b>という意味で、<b>at</b> という前置詞とセットで使います。場所が空港・駅などの場合は <b>at</b>、国や都市の場合は <b>arrive in</b> となります。</p><p><b>the next train</b> は「次の電車」、<b>the airport</b> は「その空港」です。日本語に訳すときは「その」は省略してかまいません。</p>"},
        {sp:"B", text:"The next train? It'll get there at 11:00.", ja:"次の電車ですか？11時に着きますよ。",
         explain:"<p>最初の <b>The next train?</b> は、相手の言葉を確認するための聞き返しです。「次の電車のことですよね？」という感じです。</p><p><b>It'll</b> は <b>It will</b> の短縮形で、ここの <b>it</b> は「次の電車」のことを指しています。</p><p><b>get there</b> は<b>「そこに着く」</b>という意味です。<b>get</b> はいろいろな意味を持つ動詞ですが、ここでは「到着する」という意味で、前の文の <b>arrive</b> とほぼ同じです。<b>there（そこ＝空港）</b>に着くという意味です。</p><p><b>at 11:00</b> は「11時に」。時刻を言うときは <b>at</b> を使います。</p>"},
        {sp:"A", text:"Oh, that's not good. I need to get there by 10:00.", ja:"あ、それは困ります。10時までに着く必要があるんです。",

         explain:"<p><b>Tom</b> は呼びかけです。話しかけたい相手の名前を文の最初に言います。</p><p><b>How's your essay going?</b> は<b>「エッセイの進み具合はどう？」</b>という意味です。<b>How's 〜 going?</b> は<b>「〜はどんな感じ？」</b>という決まった言い方で、進行状況をたずねるときに使います。</p><p><b>essay</b> は<b>「エッセイ・小論文・作文」</b>のことです。</p><p>後半の <b>It's due this Friday.</b> の <b>it</b> は「エッセイ」を指しています。<b>due</b> は<b>「期限である・締切である」</b>という意味です。<b>It's due 〜</b> で<b>「〜が締切である」</b>という形を覚えてください。</p><p><b>this Friday</b> は「今週の金曜日」です。</p>"},

function highlightWord(text, words){
  let result = text;
  const sorted = [...words].sort((a,b)=>b.w.length-a.w.length);
  sorted.forEach((kw,idx)=>{
    const re = new RegExp(`\\b(${kw.w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})\\b`,'i');
    result = result.replace(re, (m)=>{
      const key = getKey(currentYear, currentQ, kw.w);
      const isSaved = savedSet.has(key);
      return `<span class="word" data-word="${kw.w}" data-idx="${idx}" onclick="toggleWordPop(this)">${m}<span class="word-pop"><div class="pop-row"><span><b>${kw.mean}</b><br>【${kw.kana.replace(kw.ac, '<span class="accent">'+kw.ac+'</span>')}】</span></div><div class="pop-row" style="margin-top:6px"><button onclick="event.stopPropagation();speak('${kw.w}')">🔊 発音</button><button class="save ${isSaved?'saved':''}" onclick="event.stopPropagation();saveWord('${kw.w}','${kw.mean}','${kw.kana}',this)">${isSaved?'✓ 保存済':'＋ 保存'}</button></div></span></span>`;
    });
  });
  return result;
}

/* ============================================
   音声合成（発音）機能
   ============================================ */
let currentSpeed = 0.9;
let isPlayingAll = false;
let voicesCache = null;

// 音声リスト読み込み（ブラウザにより非同期）
function loadVoices(){
  if('speechSynthesis' in window){
    voicesCache = speechSynthesis.getVoices();
  }
}
if('speechSynthesis' in window){
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

// 男声・女声を選ぶ（A/Bの話者の区別用）
function pickVoice(speaker){
  if(!voicesCache || voicesCache.length===0) return null;
  const enVoices = voicesCache.filter(v=>v.lang.startsWith('en'));
  if(enVoices.length===0) return null;
  // ブラウザによって名前が違うので、男女の手がかりになる単語で探す
  const maleHints = ['male','man','daniel','alex','fred','david','mark','tom','aaron','arthur'];
  const femaleHints = ['female','woman','samantha','victoria','karen','susan','allison','ava','kate','zira'];
  if(speaker==='A'){
    const m = enVoices.find(v=>maleHints.some(h=>v.name.toLowerCase().includes(h)));
    if(m) return m;
  } else {
    const f = enVoices.find(v=>femaleHints.some(h=>v.name.toLowerCase().includes(h)));
    if(f) return f;
  }
  // ヒントで見つからなかったら最初のen声を返す
  return enVoices[0];
}

function speak(text, opts){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = (opts && opts.rate) || currentSpeed;
  if(opts && opts.voice){
    const v = pickVoice(opts.voice);
    if(v) u.voice = v;
  }
  if(opts && opts.onend) u.onend = opts.onend;
  speechSynthesis.speak(u);
}

// 1文ごとの発音（対話表示部のボタンから）
function speakLine(idx){
  if(isPlayingAll){
    stopAllPlay();
  }
  const data = QUESTIONS_DATA[currentYear][currentQ];
  const line = data.lines[idx];
  const text = line.text.replace(/___/g,'').replace(/\s+/g,' ').trim();
  // 再生中の文をハイライト
  document.querySelectorAll('.dialog .line').forEach(el=>el.classList.remove('playing'));
  const lineEl = document.getElementById(`line-${idx}`);
  if(lineEl) lineEl.classList.add('playing');
  speak(text, {
    voice: line.sp,
    onend: ()=>{ if(lineEl) lineEl.classList.remove('playing'); }
  });
}

// 全文再生
function toggleAllPlay(){
  if(isPlayingAll){
    stopAllPlay();
  } else {
    startAllPlay();
  }
}

function startAllPlay(){
  isPlayingAll = true;
  const btn = document.getElementById('playAllBtn');
  btn.classList.add('playing');
  document.getElementById('playAllIcon').textContent = '⏹';
  document.getElementById('playAllText').textContent = '停止';
  
  const data = QUESTIONS_DATA[currentYear][currentQ];
  let i = 0;
  
  function playNext(){
    if(!isPlayingAll || i >= data.lines.length){
      stopAllPlay();
      return;
    }
    const line = data.lines[i];
    const text = line.text.replace(/___/g,'').replace(/\s+/g,' ').trim();
    document.querySelectorAll('.dialog .line').forEach(el=>el.classList.remove('playing'));
    const lineEl = document.getElementById(`line-${i}`);
    if(lineEl){
      lineEl.classList.add('playing');
      // 画面外なら自動スクロール
      lineEl.scrollIntoView({behavior:'smooth', block:'center'});
    }
    speak(text, {
      voice: line.sp,
      onend: ()=>{
        if(lineEl) lineEl.classList.remove('playing');
        i++;
        // 文と文の間に少し間を取る
        setTimeout(playNext, 400);
      }
    });
  }
  playNext();
}

function stopAllPlay(){
  isPlayingAll = false;
  if('speechSynthesis' in window) speechSynthesis.cancel();
  document.querySelectorAll('.dialog .line').forEach(el=>el.classList.remove('playing'));
  const btn = document.getElementById('playAllBtn');
  if(btn){
    btn.classList.remove('playing');
    document.getElementById('playAllIcon').textContent = '▶️';
    document.getElementById('playAllText').textContent = '対話全体を聞く';
  }
}

function setSpeed(rate){
  currentSpeed = rate;
  document.querySelectorAll('.speed-control button').forEach(b=>{
    b.classList.toggle('on', parseFloat(b.dataset.speed)===rate);
  });
}

function saveWord(w, m, k, btn){
  const key = getKey(currentYear, currentQ, w);
  if(savedSet.has(key)){
    savedSet.delete(key);
    reviewList = reviewList.filter(r=>r.key!==key);
    btn.textContent = '＋ 保存';
    btn.classList.remove('saved');
  } else {
    savedSet.add(key);
    reviewList.push({key, w, m, k});
    btn.textContent = '✓ 保存済';
    btn.classList.add('saved');
  }
  document.getElementById('reviewCount').textContent = reviewList.length;
}

function answer(blankNum, choiceNum){
  const data = QUESTIONS_DATA[currentYear][currentQ];
  const correct = blankNum===1 ? data.answer : data.answer2;
  const choicesContainer = document.getElementById(`ch${blankNum}`);
  const choices = choicesContainer.querySelectorAll('.choice');
  choices.forEach((c,i)=>{
    if(i+1===correct) c.classList.add('correct');
    else if(i+1===choiceNum) c.classList.add('wrong');
  });
  // 和訳・発音ボタンを表示
  choicesContainer.classList.add('revealed');
  
  const isLong = data.choices2 !== undefined;
  const msg = document.getElementById('resultMsg');
  if(!isLong){
    if(choiceNum===correct){
      msg.className = 'result-msg ok show';
      msg.textContent = '🎉 正解！よくできました！';
    } else {
      msg.className = 'result-msg ng show';
      msg.textContent = `❌ 残念...正解は ${correct} 番です。詳しい解説を見てみましょう！`;
    }
  } else {
    if(choiceNum===correct){
      msg.className = 'result-msg ok show';
      msg.textContent = `🎉 ${blankNum===1?'1つ目':'2つ目'}正解！`;
    } else {
      msg.className = 'result-msg ng show';
      msg.textContent = `❌ ${blankNum===1?'1つ目':'2つ目'}残念...正解は ${correct} 番。解説を確認しましょう！`;
    }
  }
}

function showMode(mode){
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active', b.dataset.mode===mode));
  document.querySelectorAll('.mode-panel').forEach(p=>p.classList.remove('show'));
  document.getElementById(`panel-${mode}`).classList.add('show');
}

function showNextHint(){
  const data = QUESTIONS_DATA[currentYear][currentQ];
  const total = data.hints.length;
  if(hintShownCount >= total) return;
  // 次のヒントを表示
  const el = document.getElementById(`hint${hintShownCount}`);
  if(el) el.classList.add('show');
  hintShownCount++;
  // ボタンの状態を更新
  const btn = document.getElementById('nextHintBtn');
  if(!btn) return;
  if(hintShownCount >= total){
    btn.textContent = `✓ すべてのヒントを表示しました（全${total}個）`;
    btn.disabled = true;
    btn.style.opacity = '0.6';
    btn.style.cursor = 'default';
  } else {
    btn.textContent = `▶ 次のヒントを見る（${hintShownCount}/${total}）`;
  }
}

function toggleDetail(i, type){
  const el = document.getElementById(`det-${i}-${type}`);
  if(el) el.classList.toggle('show');
}

function openReview(){
  const body = document.getElementById('reviewBody');
  if(reviewList.length===0){
    body.innerHTML = '<p style="text-align:center;color:#888;padding:24px">保存した単語はまだありません。<br>本文中の単語をタップして保存してみよう！</p>';
  } else {
    body.innerHTML = reviewList.map((item,idx)=>{
      const allWords = [];
      Object.values(QUESTIONS_DATA).forEach(yr=>yr.forEach(q=>q.keyWords.forEach(k=>allWords.push(k))));
      const others = allWords.filter(a=>a.mean!==item.m).sort(()=>Math.random()-0.5).slice(0,3);
      const choices = [...others.map(o=>o.mean), item.m].sort(()=>Math.random()-0.5);
      
      return `<div class="review-card">
        <div class="review-word">${item.w} <span style="font-size:.75rem;color:#888;font-weight:400">【${item.k}】</span> <button onclick="speak('${item.w}')" style="background:none;border:1px solid var(--line);border-radius:4px;padding:2px 6px;cursor:pointer">🔊</button></div>
        <div class="review-q">この単語の意味は？</div>
        <div class="review-choices" id="rc-${idx}">
          ${choices.map((c,i)=>`<button class="review-choice" onclick="checkReview(${idx}, '${c.replace(/'/g,"\\'")}', '${item.m.replace(/'/g,"\\'")}', this)">${i+1}. ${c}</button>`).join('')}
        </div>
        <div class="review-actions">
          <button class="btn-remember" onclick="rememberWord(${idx})">✓ 覚えた（リストから消す）</button>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('reviewModal').classList.add('show');
}

function closeReview(){
  document.getElementById('reviewModal').classList.remove('show');
}

function checkReview(idx, picked, correct, btn){
  if(picked===correct){
    btn.classList.add('right');
  } else {
    btn.classList.add('bad');
    document.querySelectorAll(`#rc-${idx} button`).forEach(b=>{
      if(b.textContent.includes(correct)) b.classList.add('right');
    });
  }
}

function rememberWord(idx){
  const item = reviewList[idx];
  savedSet.delete(item.key);
  reviewList.splice(idx,1);
  document.getElementById('reviewCount').textContent = reviewList.length;
  openReview();
  document.querySelectorAll('.save').forEach(b=>{
    if(b.classList.contains('saved')){
      const word = b.closest('.word').dataset.word;
      const key = getKey(currentYear, currentQ, word);
      if(!savedSet.has(key)){
        b.textContent='＋ 保存';
        b.classList.remove('saved');
      }
    }
  });
}

renderYearPick();
renderTabs();
renderQuestion();
</script>
