<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高認英語 第6問 攻略 | GAMBA</title>
<style>
:root{
  --bg:#fef9f3;
  --paper:#ffffff;
  --ink:#2b2b2b;
  --accent:#d94f4f;
  --accent2:#2c5f8d;
  --accent3:#e8a838;
  --soft:#f3ece1;
  --line:#d8cfc0;
  --hint:#fff5e0;
  --good:#3d8b5a;
  --shadow:0 2px 0 rgba(0,0,0,.06);
  /* 段落カラー */
  --p1:#2c5f8d; /* 青 */
  --p2:#3d8b5a; /* 緑 */
  --p3:#e8a838; /* オレンジ */
  --p4:#d94f4f; /* 赤 */
  --p1-bg:#e3edf5;
  --p2-bg:#e3f1e7;
  --p3-bg:#fcefd2;
  --p4-bg:#fce0e0;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:"Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN","Yu Gothic",-apple-system,sans-serif;line-height:1.7;-webkit-text-size-adjust:100%}
body{padding:12px;max-width:780px;margin:0 auto;padding-bottom:80px}

header{background:linear-gradient(135deg,var(--accent2),#1a4870);color:#fff;padding:18px 16px;border-radius:14px;margin-bottom:14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
header::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;background:radial-gradient(circle,rgba(255,255,255,.12),transparent 70%);border-radius:50%}
header h1{font-size:1.25rem;font-weight:800;letter-spacing:.02em;margin-bottom:4px}
header p{font-size:.82rem;opacity:.92}
.badge{display:inline-block;background:var(--accent3);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:8px;font-weight:700;margin-right:6px}

.tip-banner{background:linear-gradient(135deg,#e8f4ff,#d4eaff);border:1px solid #a0c8e8;padding:10px 14px;border-radius:10px;font-size:.82rem;color:#1a4870;margin-bottom:12px;line-height:1.6}
.tip-banner b{color:var(--accent)}

.year-pick{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.year-pick button{flex:1;min-width:80px;padding:8px;background:var(--paper);border:1.5px solid var(--line);border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;color:var(--ink)}
.year-pick button.on{background:var(--accent2);color:#fff;border-color:var(--accent2)}

/* 段落俯瞰ビュー */
.story-overview{background:var(--paper);border-radius:14px;padding:14px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:14px}
.story-overview .ov-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.story-overview h3{font-size:.95rem;color:var(--accent2);font-weight:800;display:flex;align-items:center;gap:6px}
.story-overview .ov-controls{display:flex;gap:6px}
.story-overview .ov-toggle{background:var(--paper);border:1.5px solid var(--accent2);color:var(--accent2);border-radius:6px;font-size:.74rem;font-weight:700;padding:5px 10px;cursor:pointer;font-family:inherit}
.story-overview .ov-toggle:hover{background:var(--soft)}
.story-overview .ov-play{background:linear-gradient(135deg,var(--accent),#b73e3e);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-weight:700;font-size:.74rem;cursor:pointer;font-family:inherit}

.story-title{text-align:center;font-weight:800;font-size:1rem;color:var(--accent2);margin-bottom:10px;padding:6px 0;border-top:2px solid var(--accent2);border-bottom:2px solid var(--accent2);font-family:"Georgia",serif}

.para-row{display:flex;gap:10px;margin-bottom:10px;align-items:stretch}
.para-row:last-child{margin-bottom:0}
.para-tag{flex:none;width:60px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:4px;font-weight:800;font-size:.72rem;color:#fff;border-radius:6px;text-align:center;line-height:1.2}
.para-tag.p1{background:var(--p1)}
.para-tag.p2{background:var(--p2)}
.para-tag.p3{background:var(--p3);color:#5a3a10}
.para-tag.p4{background:var(--p4)}
.para-tag .ptag-num{font-size:.95rem;display:block;margin-top:2px}
.para-tag .ptag-q{font-size:.65rem;display:block;margin-top:2px;background:rgba(255,255,255,.4);padding:1px 4px;border-radius:3px;color:inherit}
.para-tag.p3 .ptag-q{background:rgba(255,255,255,.6)}

.para-body{flex:1;padding:10px 12px;border-radius:6px;font-family:"Georgia",serif;font-size:.92rem;line-height:1.75}
.para-body.p1{background:var(--p1-bg);border-left:3px solid var(--p1)}
.para-body.p2{background:var(--p2-bg);border-left:3px solid var(--p2)}
.para-body.p3{background:var(--p3-bg);border-left:3px solid var(--p3)}
.para-body.p4{background:var(--p4-bg);border-left:3px solid var(--p4)}

.story-overview .story-content.collapsed .para-body{
  max-height:3.6em;overflow:hidden;position:relative;
}
.story-overview .story-content.collapsed .para-body::after{
  content:"...";position:absolute;bottom:4px;right:8px;color:#666;font-size:.85rem;background:inherit;padding:0 4px
}

/* 設問タブ */
.q-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.q-tab{flex:1;min-width:62px;padding:10px 6px;background:var(--paper);border:2px solid var(--line);border-radius:10px;font-weight:700;font-size:.82rem;cursor:pointer;text-align:center;transition:all .15s;color:var(--ink);line-height:1.3}
.q-tab .qt-num{font-size:.7rem;font-weight:500;display:block;margin-top:2px}
.q-tab.active.qt1{background:var(--p1);color:#fff;border-color:var(--p1)}
.q-tab.active.qt2{background:var(--p2);color:#fff;border-color:var(--p2)}
.q-tab.active.qt3{background:var(--p3);color:#5a3a10;border-color:var(--p3)}
.q-tab.active.qt4{background:var(--p4);color:#fff;border-color:var(--p4)}

/* 設問カード */
.qcard{background:var(--paper);border-radius:14px;padding:16px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:14px}
.qcard.qc1{border-top:5px solid var(--p1)}
.qcard.qc2{border-top:5px solid var(--p2)}
.qcard.qc3{border-top:5px solid var(--p3)}
.qcard.qc4{border-top:5px solid var(--p4)}

.topic{padding:6px 12px;border-radius:8px;display:inline-block;font-size:.78rem;font-weight:700;margin-bottom:10px}
.topic.t1{background:var(--p1-bg);color:var(--p1)}
.topic.t2{background:var(--p2-bg);color:var(--p2)}
.topic.t3{background:var(--p3-bg);color:#5a3a10}
.topic.t4{background:var(--p4-bg);color:var(--p4)}

.q-instruction{font-size:.82rem;color:#666;margin-bottom:10px;background:#fffcf3;padding:8px 12px;border-radius:8px;border-left:3px solid var(--accent3);line-height:1.5}
.q-instruction b{color:var(--accent)}

/* 対応段落の再掲 */
.related-para{padding:12px 14px;border-radius:10px;margin-bottom:12px;font-family:"Georgia",serif;font-size:.95rem;line-height:1.85;border:2px solid}
.related-para.p1{background:var(--p1-bg);border-color:var(--p1)}
.related-para.p2{background:var(--p2-bg);border-color:var(--p2)}
.related-para.p3{background:var(--p3-bg);border-color:var(--p3)}
.related-para.p4{background:var(--p4-bg);border-color:var(--p4)}
.related-para .rp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-family:"Hiragino Maru Gothic ProN",sans-serif;font-size:.78rem;font-weight:800}
.related-para.p1 .rp-head{color:var(--p1)}
.related-para.p2 .rp-head{color:var(--p2)}
.related-para.p3 .rp-head{color:#5a3a10}
.related-para.p4 .rp-head{color:var(--p4)}
.related-para .rp-play{background:#fff;border:1.5px solid currentColor;border-radius:5px;padding:3px 8px;font-size:.72rem;font-weight:700;cursor:pointer;color:inherit;font-family:inherit}
.related-para .rp-play:hover{background:rgba(255,255,255,.8)}

.toggle-ja{margin-bottom:10px;padding:6px 12px;background:var(--paper);border:1.5px solid var(--accent2);color:var(--accent2);border-radius:6px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit}
.para-ja{display:none;background:var(--hint);padding:8px 10px;border-radius:6px;margin-top:8px;font-size:.85rem;line-height:1.65;border-left:3px solid var(--accent2);font-family:"Hiragino Maru Gothic ProN",sans-serif}
.para-ja.show{display:block}

/* キーワードハイライト */
.word{position:relative;border-bottom:2px dotted var(--accent2);cursor:help;color:var(--accent2);font-weight:600}
.word:hover, .word.tapped{background:#fff5d6}
.word-pop{position:absolute;left:50%;top:100%;transform:translateX(-50%);background:#2b2b2b;color:#fff;padding:8px 10px;border-radius:8px;font-size:.78rem;font-family:"Hiragino Maru Gothic ProN",sans-serif;font-weight:500;line-height:1.5;white-space:nowrap;z-index:50;display:none;margin-top:6px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.word-pop::before{content:"";position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-bottom-color:#2b2b2b}
.word-pop.show{display:block}
.word-pop .pop-row{display:flex;align-items:center;gap:8px;justify-content:space-between}
.word-pop .accent{color:#ffd166;font-weight:700}
.word-pop button{background:var(--accent3);color:#fff;border:none;border-radius:6px;padding:3px 8px;font-size:.72rem;cursor:pointer;font-family:inherit}
.word-pop button.save{background:var(--good)}
.word-pop button.saved{background:#888}
.word-pop button.speak{background:var(--accent2);font-size:.85rem;padding:3px 9px}
.word-pop .pop-buttons{display:flex;gap:4px;flex-direction:column}

/* 質問・選択肢 */
.qsec{background:#fafafa;border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px}
.qsec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.qsec-num{display:inline-block;color:#fff;font-weight:800;padding:3px 10px;border-radius:6px;font-size:.78rem}
.qsec-num.s1{background:var(--p1)}
.qsec-num.s2{background:var(--p2)}
.qsec-num.s3{background:var(--p3);color:#5a3a10}
.qsec-num.s4{background:var(--p4)}
.qsec-question{font-family:"Georgia",serif;font-size:.95rem;line-height:1.6;margin-bottom:8px;color:var(--ink)}
.qsec-question .blank-num{display:inline-block;background:#fff5d6;border:1.5px dashed var(--accent3);color:var(--accent3);padding:1px 12px;margin:0 4px;border-radius:4px;font-weight:800;font-size:.85rem;font-family:sans-serif}

.choices{display:grid;grid-template-columns:1fr;gap:8px;margin-top:10px}
.choice{background:var(--paper);border:2px solid var(--line);border-radius:10px;padding:10px 12px;font-size:.92rem;cursor:pointer;text-align:left;font-family:"Georgia",serif;color:var(--ink);transition:all .15s;line-height:1.45;font-weight:600}
.choice .num{display:inline-block;background:var(--soft);color:var(--accent2);font-weight:800;width:22px;height:22px;border-radius:50%;text-align:center;line-height:22px;margin-right:8px;font-size:.78rem;font-family:sans-serif;vertical-align:middle}
.choice.correct{background:#e8f5e9;border-color:var(--good)}
.choice.correct .num{background:var(--good);color:#fff}
.choice.wrong{background:#fde8e8;border-color:var(--accent);opacity:.85}
.choice.wrong .num{background:var(--accent);color:#fff}

.result-msg{margin-top:10px;padding:12px;border-radius:8px;font-weight:700;text-align:center;display:none}
.result-msg.show{display:block}
.result-msg.ok{background:#e8f5e9;color:var(--good)}
.result-msg.ng{background:#fde8e8;color:var(--accent)}

/* モード切替 */
.mode-tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:14px 0 10px}
.mode-btn{padding:10px 8px;border:2px solid var(--line);background:var(--paper);border-radius:10px;font-size:.78rem;font-weight:700;cursor:pointer;text-align:center;color:var(--ink);line-height:1.3;font-family:inherit}
.mode-btn.active{background:var(--accent3);color:#fff;border-color:var(--accent3)}

.mode-panel{background:var(--soft);padding:14px;border-radius:10px;margin-top:6px;display:none;border:1px solid var(--line)}
.mode-panel.show{display:block}
.mode-panel h3{font-size:.92rem;color:var(--accent2);margin-bottom:8px;border-left:4px solid var(--accent3);padding-left:8px}

.hint-buttons{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.hint-btn{flex:1;min-width:80px;padding:8px;background:var(--accent3);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:.8rem;cursor:pointer;font-family:inherit}
.hint-box{background:var(--paper);padding:10px 12px;border-left:4px solid var(--accent3);border-radius:6px;margin-bottom:6px;font-size:.88rem;line-height:1.6;display:none}
.hint-box.show{display:block;animation:slidein .25s}
.hint-box p{margin-bottom:6px}
.hint-box p:last-child{margin-bottom:0}

.hint-box .word-table{width:100%;border-collapse:collapse;margin:8px 0;background:var(--soft);border-radius:6px;overflow:hidden;font-size:.85rem}
.hint-box .word-table th{background:var(--accent2);color:#fff;padding:5px 8px;text-align:left;font-weight:700;font-size:.78rem}
.hint-box .word-table td{padding:5px 8px;border-bottom:1px solid var(--line)}
.hint-box .word-table tr:last-child td{border-bottom:none}
.hint-box .word-table .en{font-family:"Georgia",serif;font-weight:700;color:var(--accent2);width:40%}
.hint-box .word-table .ja{color:var(--ink)}
.hint-box .step{margin-top:8px;padding:8px 10px;background:#fff5e0;border-radius:6px;border-left:3px solid var(--accent3)}
.hint-box .think-arrow{color:var(--accent);font-weight:800;margin:0 4px}
.hint-box .strategy{margin-top:8px;padding:10px 12px;background:#e8f4ff;border-radius:6px;border-left:3px solid var(--accent2)}
.hint-box .strategy b{color:var(--accent2)}
.hint-box .signal-word{background:#fff5d6;padding:1px 6px;border-radius:4px;font-weight:800;color:var(--accent);font-family:"Georgia",serif}
@keyframes slidein{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.hint-num{font-weight:800;color:#fff;background:var(--accent);display:inline-block;padding:2px 10px;border-radius:6px;font-size:.78rem;margin-bottom:6px}

.explain-box{background:var(--paper);padding:14px;border-radius:8px;border-left:4px solid var(--accent3);font-size:.9rem;line-height:1.85}
.explain-box p{margin-bottom:10px}
.explain-box p:last-child{margin-bottom:0}
.explain-box b{color:var(--accent);background:#fff;padding:0 3px;border-radius:3px}
.explain-box .ans-key{display:inline-block;background:#fffcf3;border:1.5px solid var(--good);color:var(--good);padding:3px 10px;border-radius:6px;font-weight:800;margin-bottom:8px;font-size:.92rem}
.explain-box .check-table{width:100%;border-collapse:collapse;margin:10px 0;background:#fafafa;border-radius:6px;overflow:hidden;font-size:.85rem}
.explain-box .check-table th{background:var(--accent2);color:#fff;padding:6px 8px;text-align:left;font-size:.78rem}
.explain-box .check-table td{padding:6px 8px;border-bottom:1px solid var(--line);background:#fff}
.explain-box .check-table tr:last-child td{border-bottom:none}
.explain-box .check-table .ng{color:var(--accent);font-weight:700}
.explain-box .check-table .ok{color:var(--good);font-weight:700}
.explain-box .ja-trans{background:var(--hint);padding:8px 10px;border-radius:6px;margin-top:10px;border-left:3px solid var(--accent2)}
.explain-box .ja-trans b{color:var(--accent2);background:transparent;padding:0}
.explain-box .clue-quote{background:#fff5d6;padding:6px 10px;border-radius:5px;margin:6px 0;border-left:3px solid var(--accent3);font-family:"Georgia",serif;font-size:.88rem}
.explain-box .clue-quote::before{content:"💡 本文の根拠：";display:block;font-family:"Hiragino Maru Gothic ProN",sans-serif;font-size:.75rem;color:#806000;font-weight:800;margin-bottom:3px}

/* 復習リスト */
.review-fab{position:fixed;bottom:14px;right:14px;background:var(--accent);color:#fff;border:none;border-radius:30px;padding:12px 16px;font-weight:800;font-size:.85rem;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:100;font-family:inherit}
.review-fab .count{background:#fff;color:var(--accent);border-radius:50%;padding:1px 7px;margin-left:6px;font-size:.75rem}
.review-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:14px}
.review-modal.show{display:flex}
.review-content{background:var(--paper);border-radius:14px;padding:18px;max-width:420px;width:100%;max-height:85vh;overflow-y:auto}
.review-content h2{color:var(--accent);font-size:1.05rem;margin-bottom:10px}
.review-card{background:var(--soft);padding:12px;border-radius:10px;margin-bottom:10px}
.review-word{font-size:1.1rem;font-weight:800;color:var(--accent2);margin-bottom:6px;font-family:"Georgia",serif}
.review-q{font-size:.85rem;margin-bottom:8px;color:#555}
.review-actions{display:flex;gap:6px;margin-top:8px}
.review-actions button{flex:1;padding:8px;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:.8rem;color:#fff;font-family:inherit}
.btn-remember{background:var(--good)}
.close-btn{background:#888;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;font-family:inherit}

/* ヒント注意書き */
.hint-notice{background:#fff8e1;border:1px solid #ffd982;padding:10px 12px;border-radius:8px;font-size:.8rem;color:#806000;margin-bottom:10px;line-height:1.55}
.hint-notice b{color:#a05000}

/* 学習のすすめ */
.study-rec{background:linear-gradient(135deg,#f0f8e8,#dcefcd);border:1px solid #a5c97c;padding:12px 14px;border-radius:10px;font-size:.85rem;color:#3a5a1f;margin-top:14px;line-height:1.7}
.study-rec b{color:#2c4a14}
.study-rec h4{color:#2c4a14;margin-bottom:6px;font-size:.92rem}
.study-rec a{display:inline-block;background:#5a8a2c;color:#fff;padding:6px 12px;border-radius:6px;text-decoration:none;font-weight:700;font-size:.82rem;margin:4px 4px 0 0;font-family:inherit}
.study-rec a:hover{background:#3e6a14}

@media (max-width:480px){
  .para-tag{width:50px;font-size:.68rem}
  .para-tag .ptag-num{font-size:.85rem}
  .para-body{font-size:.86rem;padding:8px 10px}
  .qsec-question{font-size:.9rem}
  .choice{font-size:.88rem;padding:9px 10px}
  .related-para{font-size:.9rem;padding:10px 12px}
}
</style>
</head>
<body>

<header>
  <h1>📖 高認英語 第6問 攻略</h1>
  <p><span class="badge">長文読解</span>段落と設問は対応している！全文読まなくても解ける戦略</p>
</header>

<div class="tip-banner">
  💡 <b>このヒントの使い方</b><br>
  これは<b>「英語が苦手な方が 40点合格を取る」ための戦略的ヒント</b>です。<b>満点用ではありません</b>。確実に得点を伸ばすには、まず<b>中学英単語・中学英文法</b>を学んだうえで、このヒントを補助として使ってください。
</div>

<div class="year-pick" id="yearPick"></div>

<!-- 段落俯瞰ビュー -->
<div class="story-overview" id="storyOverview"></div>

<!-- 設問タブ -->
<div class="q-tabs" id="qTabs"></div>

<!-- 設問本体 -->
<div id="qContainer"></div>

<button class="review-fab" onclick="openReview()">📚 復習リスト<span class="count" id="reviewCount">0</span></button>

<div class="review-modal" id="reviewModal">
  <div class="review-content">
    <h2>📚 復習リスト</h2>
    <div id="reviewBody"></div>
    <button class="close-btn" onclick="closeReview()">閉じる</button>
  </div>
</div>


<script>
const QUESTIONS_DATA = {

// ============================================================
// R7-1：Kenの清掃イベント（社会・リーダーシップ）
// ============================================================
"R7-1": {
  storyTitle: "Ken's Community Clean-Up",
  topicJa: "ケンの地域清掃活動",
  paragraphs: [
    {
      summary: "通学路のゴミ問題に気づく",
      en: "Ken, a hardworking high school student, always took pride in his school and his role as a member of the student council. Recently, as he was walking from the train station to school, he noticed that the street had become dirtier than before. There were plastic bottles, cans, and even scraps of food scattered along the street. Ken felt he had to do something about this problem. As he discussed the issue with friends at school, he found that many students shared his concern. This made him decide to take action.",

      explain: '<p>第4段落「サムが嬉しかった理由」を聞く問題です。</p><div class="ans-key">✅ 正解：① see Vince full of energy once again</div><div class="clue-quote">As soon as Vince was put in his wheelchair, he started running around excitedly. Sam was happy to see his best friend acting energetically.</div><p><b>本文 <span style="background:#fff5d6;padding:1px 5px;border-radius:3px;color:#d94f4f;font-weight:700;font-family:Georgia,serif">running around excitedly</span>（興奮して走り回る）+ <span style="background:#fff5d6;padding:1px 5px;border-radius:3px;color:#d94f4f;font-weight:700;font-family:Georgia,serif">acting energetically</span>（元気に振る舞う）= <span style="background:#fff5d6;padding:1px 5px;border-radius:3px;color:#d94f4f;font-weight:700;font-family:Georgia,serif">full of energy</span>（元気いっぱい）</b>。「興奮して走り回る」+「元気に振る舞う」=「元気いっぱい」と要約。</p><p><b>各選択肢のチェック：</b></p><table class="check-table"><tr><th>選択肢</th><th>本文との照合</th><th>判定</th></tr><tr><td>① ヴィンスが再び元気いっぱい</td><td>「acting energetically」と一致</td><td class="ok">○</td></tr><tr><td>② 新しい車椅子で動き回ること</td><td>動き回ったのは<b>ヴィンス</b>。<b>サム</b>ではない</td><td class="ng">×</td></tr><tr><td>③ 怪我から完全回復</td><td>本文に「fully recovered」の記述なし。車椅子で対応</td><td class="ng">×</td></tr><tr><td>④ 車椅子が安かった</td><td>本文に価格の話なし</td><td class="ng">×</td></tr></table><p><b>判断のポイント1：誰が動いたかの確認</b><br>本文「<b>he started running around</b>」の<b>he</b>=<b>Vince</b>（ヴィンス）。サムは<b>見て嬉しかった</b>のであって、サム自身が動いたわけではありません。②は主語のすり替え。</p><p><b>判断のポイント2：「fully recovered」と「acting energetically」の違い</b><br><b>fully recovered</b>（完全回復）=怪我が治る。本文ではヴィンスは怪我が治ったわけではなく、<b>車椅子で動けるようになった</b>のです。状態は違うので③は ×。</p><p><b>判断のポイント3：「once again」（再び）の意味</b><br>選択肢①の「<b>once again</b>」=以前のように再び元気に。本文の流れ「以前は元気→怪我→車椅子で<b>再び元気</b>」と一致します。</p><p><b>覚えておきたい単語</b>：<b>energetically / full of energy</b>（元気に／元気いっぱい）、<b>customized</b>（特注の）、<b>fortunately</b>（幸いに）、<b>as soon as</b>（〜するとすぐに）。</p>'
    }
  ]
};


// ==================== 状態管理 ====================
let currentYear = "R7-1";
let currentQ = 0;
let currentMode = "hint";
let answeredMap = {};
let savedWords = [];
let storyExpanded = true; // 俯瞰ビューの展開状態

function getKey(year, q){ return year + "_" + q; }

// ==================== 設問タブ ====================
function renderTabs(){
  const tabs = document.getElementById('qTabs');

  data.questions.forEach((q, i)=>{

// ==================== キーワードハイライト ====================
function highlightWord(text, words){
  if(!words || words.length === 0) return text;
  const sorted = [...words].sort((a,b) => b.w.length - a.w.length);
  let result = text;
  const replaced = new Set();
  sorted.forEach(kw => {
    if(replaced.has(kw.w.toLowerCase())) return;
    const safe = kw.w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`\\b(${safe})\\b`, 'i');
    if(result.match(regex)){
      const opts = JSON.stringify({m:kw.mean, k:kw.kana, a:kw.ac});
      const escapedOpts = opts.replace(/"/g, '&quot;');
      result = result.replace(regex, 
        `<span class="word" data-opts="${escapedOpts}" onclick="showVwPop(this,event)">$1</span>`);
      replaced.add(kw.w.toLowerCase());
    }
  });
  return result;
}

// ==================== 設問本体 ====================
function renderQuestion(){
  const data = QUESTIONS_DATA[currentYear];
  const q = data.questions[currentQ];
  const para = data.paragraphs[q.paraIdx];
  const c = document.getElementById('qContainer');

  const pIdx = q.paraIdx + 1;
  const pColor = `p${pIdx}`;
  const tColor = `t${pIdx}`;
  const sColor = `s${pIdx}`;
  const qcColor = `qc${pIdx}`;

  // 段落本文（キーワードハイライト適用）
  const decoratedPara = highlightWord(para.en, q.keyWords);
  // 質問文・選択肢にもハイライト
  const decoratedQpre = highlightWord(q.qPre, q.keyWords);
  const decoratedQpost = highlightWord(q.qPost || '', q.keyWords);
  const decoratedChoices = q.choices.map(ch => highlightWord(ch, q.keyWords));

  // 選択肢
  let choicesHtml = '';
  decoratedChoices.forEach((ch, i)=>{
    choicesHtml += `<button class="choice" data-idx="${i}" onclick="pickChoice(${i})">
      <span class="num">${i+1}</span>${ch}
    </button>`;
  });

  // ヒント
  let hintsHtml = '';
  q.hints.forEach((h, i)=>{
    hintsHtml += `<div class="hint-box" id="hint${i}"><span class="hint-num">ヒント${i+1}</span><div>${h}</div></div>`;
  });

  c.innerHTML = `
    <div class="qcard ${qcColor}">
      <div class="topic ${tColor}">📖 設問${q.no}：${getQTopicLabel(q.no)}</div>
      <div class="q-instruction">
        次の英文を読み、 <span style="background:#fff5d6;border:1px dashed #e8a838;padding:0 6px;border-radius:3px;color:#e8a838;font-weight:800">${q.qNum}</span> 内に入れるのに最も適当なものを 1〜4 から一つ選びなさい。<br>
        <b style="color:var(--${pColor})">この問題は第${pIdx}段落（§${pIdx}）に対応しています。</b>
      </div>

      <div class="related-para ${pColor}">
        <div class="rp-head">
          <span>📍 第${pIdx}段落 — ${para.summary}</span>
          <button class="rp-play" onclick="playParagraph(${q.paraIdx})">🔊 段落を読み上げ</button>
        </div>
        ${decoratedPara}
        <div class="para-ja" id="paraJa">${para.ja}</div>
      </div>

      <button class="toggle-ja" onclick="toggleParaJa()">📝 日本語訳を表示／非表示</button>

      <div class="qsec">
        <div class="qsec-head">
          <span class="qsec-num ${sColor}">設問 No.${q.qNum}</span>
        </div>
        <div class="qsec-question">
          ${decoratedQpre} <span class="blank-num">${q.qNum}</span>${decoratedQpost ? ' ' + decoratedQpost : ''}
        </div>
        <div style="font-size:.82rem;color:#666;margin-bottom:6px">${q.qPreJa}<b>　〜</b>${q.qPostJa || ''}</div>
        <div class="choices" id="choicesBox">${choicesHtml}</div>
        <div class="result-msg" id="resultMsg"></div>
      </div>

      <div class="mode-tabs">
        <button class="mode-btn ${currentMode==='hint'?'active':''}" onclick="setMode('hint')">💡 ヒントモード</button>
        <button class="mode-btn ${currentMode==='explain'?'active':''}" onclick="setMode('explain')">📚 詳しい解説</button>
      </div>

      <div class="mode-panel ${currentMode==='hint'?'show':''}" id="hintPanel">
        <h3>💡 段階的ヒント（長文読解のコツ）</h3>
        <div class="hint-notice">
          ⚠️ <b>このヒントは「合格点（40点〜）を取るための戦略」です。</b>本番で安定して点を取るには、<b>中学英単語・中学英文法</b>の基礎力が必要です。
        </div>
        <div class="hint-buttons">
          <button class="hint-btn" onclick="showHint(0)">①カギの単語</button>
          <button class="hint-btn" onclick="showHint(1)">②段落の見方</button>
          <button class="hint-btn" onclick="showHint(2)">③消去法</button>
        </div>
        ${hintsHtml}
      </div>

      <div class="mode-panel ${currentMode==='explain'?'show':''}" id="explainPanel">
        <h3>📚 詳しい解説</h3>
        <div class="explain-box">${q.explain}</div>
        <div class="study-rec">
          <h4>📖 もっと安定して点を取りたい方へ</h4>
          このアプリのヒントは「<b>段落と設問の対応を使って解く戦略</b>」を紹介しています。本番でもっと余裕を持って解きたい方は、<b>中学英単語・中学英文法</b>のアプリで基礎を固めましょう。基礎ができれば、ヒントなしでも安定して解けるようになります。<br>
          <a href="https://realizefield.github.io/j-engglish-word/" target="_blank">📚 中学英単語アプリ</a>
          <a href="https://realizefield.github.io/j-english/" target="_blank">📝 中学英文法アプリ</a>
          <a href="https://realizefield.github.io/kounin_eng_grammer/kounineng-index.html" target="_blank">🎯 高認英文法アプリ</a>
        </div>
      </div>
    </div>
  `;

  const k = getKey(currentYear, currentQ);
  if(answeredMap[k] !== undefined){
    revealAnswer(answeredMap[k], false);
  }
}

function getQTopicLabel(no){
  const labels = {
    1: "第1段落の内容",
    2: "第2段落の内容",
    3: "第3段落の内容",
    4: "第4段落・全体テーマ"
  };
  return labels[no] || "段落内容";
}

// ==================== 日本語訳トグル ====================
function toggleParaJa(){
  const el = document.getElementById('paraJa');
  if(el) el.classList.toggle('show');
}

// ==================== モード切替 ====================
function setMode(m){
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  if(event && event.target) event.target.classList.add('active');
  const hp = document.getElementById('hintPanel');
  const ep = document.getElementById('explainPanel');
  if(hp) hp.classList.toggle('show', m === 'hint');
  if(ep) ep.classList.toggle('show', m === 'explain');
}

function showHint(i){
  const box = document.getElementById('hint' + i);
  if(box) box.classList.toggle('show');
}

// ==================== 選択肢 ====================
function pickChoice(i){
  const k = getKey(currentYear, currentQ);
  if(answeredMap[k] !== undefined) return;
  answeredMap[k] = i;
  revealAnswer(i, true);
}

function revealAnswer(picked, showMsg){
  const data = QUESTIONS_DATA[currentYear];
  const q = data.questions[currentQ];
  const ans = q.answer - 1;
  const choicesEl = document.getElementById('choicesBox');
  if(!choicesEl) return;
  const buttons = choicesEl.querySelectorAll('.choice');
  buttons.forEach((btn, i)=>{
    if(i === ans) btn.classList.add('correct');
    else if(i === picked) btn.classList.add('wrong');
  });
  if(showMsg){
    const msg = document.getElementById('resultMsg');
    if(picked === ans){
      msg.className = 'result-msg ok show';
      msg.textContent = '🎉 正解！';
    } else {
      msg.className = 'result-msg ng show';
      msg.textContent = `残念。正解は ${q.answer} 番です。`;
    }
  }
}

// ==================== vw popup ====================
let activeWordPop = null;

function showVwPop(el, ev){
  if(ev) ev.stopPropagation();
  if(activeWordPop && activeWordPop !== el){
    closeVwPop(activeWordPop);
  }
  if(el.classList.contains('tapped')){
    closeVwPop(el);
    return;
  }
  el.classList.add('tapped');
  const opts = JSON.parse(el.getAttribute('data-opts').replace(/&quot;/g, '"'));
  const word = el.textContent;
  const isSaved = savedWords.some(w => w.w === word);

  const pop = document.createElement('span');
  pop.className = 'word-pop show';
  pop.innerHTML = `
    <div class="pop-row">
      <div>
        <div><b>${word}</b> [${opts.k}] ${opts.a ? `<span class="accent">▶${opts.a}</span>` : ''}</div>
        <div>${opts.m}</div>
      </div>
      <div class="pop-buttons">
        <button class="speak" onclick="event.stopPropagation();speakWord('${word.replace(/'/g, "\\'")}')">🔊</button>
        <button class="${isSaved ? 'saved' : 'save'}" onclick="event.stopPropagation();saveWord('${word.replace(/'/g, "\\'")}','${opts.m.replace(/'/g, "\\'")}','${opts.k.replace(/'/g, "\\'")}',this)">${isSaved ? '✓' : '保存'}</button>
      </div>
    </div>
  `;
  el.appendChild(pop);
  activeWordPop = el;
}

function closeVwPop(el){
  el.classList.remove('tapped');
  const pop = el.querySelector('.word-pop');
  if(pop) pop.remove();
  if(activeWordPop === el) activeWordPop = null;
}

document.addEventListener('click', e => {
  if(activeWordPop && !activeWordPop.contains(e.target)){
    closeVwPop(activeWordPop);
  }
});

function saveWord(w, m, k, btn){
  if(savedWords.some(x => x.w === w)) return;
  const data = QUESTIONS_DATA[currentYear];
  const q = data.questions[currentQ];
  savedWords.push({w, m, k, year:currentYear, qNo:q.no});
  btn.textContent = '✓';
  btn.className = 'saved';
  document.getElementById('reviewCount').textContent = savedWords.length;
}

// ==================== 音声合成 ====================
let voices = [];
let currentSpeech = null;

function loadVoices(){
  voices = window.speechSynthesis.getVoices();
}
if('speechSynthesis' in window){
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

function pickVoice(){
  if(voices.length === 0) loadVoices();
  const priorityNames = ['Samantha','Karen','Zira','Google US English','Google UK English Female','Microsoft Zira','Allison','Ava','Susan'];
  for(const name of priorityNames){
    const v = voices.find(voice => voice.name.includes(name) && /en-US|en-GB|en-AU/i.test(voice.lang));
    if(v) return v;
  }
  const femaleByName = voices.find(v => /en-US|en-GB|en-AU/i.test(v.lang) && /female|woman/i.test(v.name));
  if(femaleByName) return femaleByName;
  const maleNames = /male|man|David|Daniel|Alex|Tom|James|Mark|George|Fred/i;
  const nonMaleEn = voices.find(v => /en-US|en-GB|en-AU/i.test(v.lang) && !maleNames.test(v.name));
  if(nonMaleEn) return nonMaleEn;
  return voices.find(v => /en/i.test(v.lang)) || voices[0];
}

function speakWord(word){
  if(!('speechSynthesis' in window)){ alert('お使いのブラウザは音声非対応'); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  const v = pickVoice();
  if(v) u.voice = v;
  u.lang = 'en-US'; u.rate = 0.85; u.pitch = 1.15;
  speechSynthesis.speak(u);
}

function playParagraph(paraIdx){
  if(!('speechSynthesis' in window)){ alert('お使いのブラウザは音声非対応'); return; }
  stopAllPlay();
  const data = QUESTIONS_DATA[currentYear];
  const text = data.paragraphs[paraIdx].en;
  const u = new SpeechSynthesisUtterance(text);
  const v = pickVoice();
  if(v) u.voice = v;
  u.lang = 'en-US'; u.rate = 0.9; u.pitch = 1.15;
  currentSpeech = u;
  speechSynthesis.speak(u);
}

function playStory(){
  if(!('speechSynthesis' in window)){ alert('お使いのブラウザは音声非対応'); return; }
  stopAllPlay();
  const data = QUESTIONS_DATA[currentYear];
  const text = data.paragraphs.map(p => p.en).join(' ');
  const u = new SpeechSynthesisUtterance(text);
  const v = pickVoice();
  if(v) u.voice = v;
  u.lang = 'en-US'; u.rate = 0.9; u.pitch = 1.15;
  currentSpeech = u;
  speechSynthesis.speak(u);
}

function stopAllPlay(){
  if('speechSynthesis' in window){ speechSynthesis.cancel(); }
  currentSpeech = null;
}

// ==================== 復習リスト ====================
function openReview(){
  const body = document.getElementById('reviewBody');
  if(savedWords.length === 0){
    body.innerHTML = '<p style="text-align:center;color:#888;padding:20px">まだ単語が保存されていません。<br>本文中の<span style="color:var(--accent2);text-decoration:underline">下線つきの単語</span>をタップして「保存」ボタンを押してください。</p>';
  } else {
    body.innerHTML = savedWords.map((w, i)=>`
      <div class="review-card">
        <div class="review-word">${w.w}</div>
        <div class="review-q">[${w.k}] ${w.m}</div>
        <div style="font-size:.75rem;color:#888;">令和${w.year[1]}年 第${w.year[3]}回 問${w.qNo}より</div>
        <div class="review-actions">
          <button class="btn-remember" onclick="removeWord(${i})">✓ 覚えた</button>
        </div>
      </div>
    `).join('');
  }
  document.getElementById('reviewModal').classList.add('show');
}
function closeReview(){
  document.getElementById('reviewModal').classList.remove('show');
}
function removeWord(i){
  savedWords.splice(i, 1);
  document.getElementById('reviewCount').textContent = savedWords.length;
  openReview();
}

// ==================== 初期化 ====================
renderYearPick();
renderStoryOverview();
renderTabs();
renderQuestion();

</script>
