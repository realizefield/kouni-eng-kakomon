<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高認英語 第2問 攻略 | GAMBA</title>
<style>
:root{
  --bg:#fef9f3;
  --paper:#ffffff;
  --ink:#2b2b2b;
  --accent:#d94f4f;
  --accent2:#2c5f8d;
  --accent3:#e8a838;
  --soft:#f3ece1;
  --line:#d8cfc0;
  --hint:#fff5e0;
  --good:#3d8b5a;
  --shadow:0 2px 0 rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:"Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN","Yu Gothic",-apple-system,sans-serif;line-height:1.7;-webkit-text-size-adjust:100%}
body{padding:12px;max-width:780px;margin:0 auto;padding-bottom:80px}

header{background:linear-gradient(135deg,var(--accent2),#1a4870);color:#fff;padding:18px 16px;border-radius:14px;margin-bottom:14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
header::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;background:radial-gradient(circle,rgba(255,255,255,.12),transparent 70%);border-radius:50%}
header h1{font-size:1.25rem;font-weight:800;letter-spacing:.02em;margin-bottom:4px}
header p{font-size:.82rem;opacity:.92}
.badge{display:inline-block;background:var(--accent3);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:8px;font-weight:700;margin-right:6px}

.q-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.q-tab{flex:1;min-width:62px;padding:10px 6px;background:var(--paper);border:2px solid var(--line);border-radius:10px;font-weight:700;font-size:.82rem;cursor:pointer;text-align:center;transition:all .15s;color:var(--ink)}
.q-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.year-pick{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.year-pick button{flex:1;min-width:80px;padding:8px;background:var(--paper);border:1.5px solid var(--line);border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;color:var(--ink)}
.year-pick button.on{background:var(--accent2);color:#fff;border-color:var(--accent2)}

.qcard{background:var(--paper);border-radius:14px;padding:16px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:14px}
.topic{background:var(--soft);padding:6px 12px;border-radius:8px;display:inline-block;font-size:.78rem;font-weight:700;color:var(--accent2);margin-bottom:10px}

/* 短文表示 */
.sentence{font-size:1rem;line-height:2;font-family:"Georgia",serif;padding:12px;background:#fdf8f0;border-radius:10px;border:1px dashed var(--line)}
.sentence-play{background:linear-gradient(135deg,var(--accent),#b73e3e);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-weight:800;font-size:.85rem;cursor:pointer;box-shadow:0 2px 6px rgba(217,79,79,.3);display:flex;align-items:center;gap:8px;margin-bottom:10px;font-family:inherit}
.sentence-play:active{transform:scale(.98)}

.blank{display:inline-block;background:var(--hint);border:2px dashed var(--accent3);padding:2px 28px;border-radius:6px;font-weight:700;color:var(--accent3);min-width:120px;text-align:center}

.word{position:relative;border-bottom:2px dotted var(--accent2);cursor:help;color:var(--accent2);font-weight:600}
.word:hover, .word.tapped{background:#fff5d6}
.word-pop{position:absolute;left:50%;top:100%;transform:translateX(-50%);background:#2b2b2b;color:#fff;padding:8px 10px;border-radius:8px;font-size:.78rem;font-family:"Hiragino Maru Gothic ProN",sans-serif;font-weight:500;line-height:1.5;white-space:nowrap;z-index:50;display:none;margin-top:6px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.word-pop::before{content:"";position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-bottom-color:#2b2b2b}
.word-pop.show{display:block}
.word-pop .pop-row{display:flex;align-items:center;gap:8px;justify-content:space-between}
.word-pop .accent{color:#ffd166;font-weight:700}
.word-pop button{background:var(--accent3);color:#fff;border:none;border-radius:6px;padding:3px 8px;font-size:.72rem;cursor:pointer;font-family:inherit}
.word-pop button.save{background:var(--good)}
.word-pop button.saved{background:#888}
.word-pop button.speak{background:var(--accent2);padding:3px 7px;font-size:.78rem;line-height:1}
.word-pop .pop-btns{display:flex;flex-direction:column;gap:4px;flex-shrink:0}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.choice{background:var(--paper);border:2px solid var(--line);border-radius:10px;padding:10px;font-size:.92rem;cursor:pointer;text-align:left;font-family:"Georgia",serif;color:var(--ink);transition:all .15s;line-height:1.4;display:block;width:100%}
.choice .num{display:inline-block;background:var(--soft);color:var(--accent2);font-weight:800;width:22px;height:22px;border-radius:50%;text-align:center;line-height:22px;margin-right:6px;font-size:.78rem;font-family:sans-serif}
.choice.correct{background:#e8f5e9;border-color:var(--good)}
.choice.correct .num{background:var(--good);color:#fff}
.choice.wrong{background:#fde8e8;border-color:var(--accent);opacity:.85}
.choice.wrong .num{background:var(--accent);color:#fff}
.choice .ja-row{display:none;margin-top:8px;padding-top:8px;border-top:1px dashed rgba(0,0,0,.15);font-family:"Hiragino Maru Gothic ProN",sans-serif;font-size:.82rem;color:#444;align-items:center;gap:8px}
.choices.revealed .choice .ja-row{display:flex}
.choice .ja-text{flex:1;line-height:1.5}
.choice .ja-icon{color:var(--accent2);font-weight:800;font-family:sans-serif}

.mode-tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:14px 0 10px}
.mode-btn{padding:10px 8px;border:2px solid var(--line);background:var(--paper);border-radius:10px;font-size:.78rem;font-weight:700;cursor:pointer;text-align:center;color:var(--ink);line-height:1.3}
.mode-btn.active{background:var(--accent3);color:#fff;border-color:var(--accent3)}

.mode-panel{background:var(--soft);padding:14px;border-radius:10px;margin-top:6px;display:none;border:1px solid var(--line)}
.mode-panel.show{display:block}
.mode-panel h3{font-size:.92rem;color:var(--accent2);margin-bottom:8px;border-left:4px solid var(--accent3);padding-left:8px}

.hint-buttons{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.hint-btn{flex:1;min-width:80px;padding:8px;background:var(--accent3);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:.8rem;cursor:pointer}
.hint-box{background:var(--paper);padding:10px 12px;border-left:4px solid var(--accent3);border-radius:6px;margin-bottom:6px;font-size:.88rem;line-height:1.6;display:none}
.hint-box.show{display:block;animation:slidein .25s}
.hint-box p{margin-bottom:6px}
.hint-box p:last-child{margin-bottom:0}

/* ヒント内の単語表 */
.hint-box .word-table{width:100%;border-collapse:collapse;margin:8px 0;background:var(--soft);border-radius:6px;overflow:hidden;font-size:.85rem}
.hint-box .word-table th{background:var(--accent2);color:#fff;padding:5px 8px;text-align:left;font-weight:700;font-size:.78rem}
.hint-box .word-table td{padding:5px 8px;border-bottom:1px solid var(--line)}
.hint-box .word-table tr:last-child td{border-bottom:none}
.hint-box .word-table .en{font-family:"Georgia",serif;font-weight:700;color:var(--accent2);width:40%}
.hint-box .word-table .ja{color:var(--ink)}
.hint-box .step{margin-top:8px;padding:8px 10px;background:#fff5e0;border-radius:6px;border-left:3px solid var(--accent3)}
.hint-box .think-arrow{color:var(--accent);font-weight:800;margin:0 4px}
@keyframes slidein{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.hint-num{font-weight:800;color:#fff;background:var(--accent);display:inline-block;padding:2px 10px;border-radius:6px;font-size:.78rem;margin-bottom:6px}

/* 解説本体 */
.explain-box{background:var(--paper);padding:14px;border-radius:8px;border-left:4px solid var(--accent3);font-size:.9rem;line-height:1.85}
.explain-box p{margin-bottom:10px}
.explain-box p:last-child{margin-bottom:0}
.explain-box b{color:var(--accent);background:#fff;padding:0 3px;border-radius:3px}
.explain-box .ja-trans{background:var(--hint);padding:8px 10px;border-radius:6px;margin-top:10px;border-left:3px solid var(--accent2)}
.explain-box .ja-trans b{color:var(--accent2);background:transparent;padding:0}

.review-fab{position:fixed;bottom:14px;right:14px;background:var(--accent);color:#fff;border:none;border-radius:30px;padding:12px 16px;font-weight:800;font-size:.85rem;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:100}
.review-fab .count{background:#fff;color:var(--accent);border-radius:50%;padding:1px 7px;margin-left:6px;font-size:.75rem}
.review-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:14px}
.review-modal.show{display:flex}
.review-content{background:var(--paper);border-radius:14px;padding:18px;max-width:420px;width:100%;max-height:85vh;overflow-y:auto}
.review-content h2{color:var(--accent);font-size:1.05rem;margin-bottom:10px}
.review-card{background:var(--soft);padding:12px;border-radius:10px;margin-bottom:10px}
.review-word{font-size:1.1rem;font-weight:800;color:var(--accent2);margin-bottom:6px;font-family:"Georgia",serif}
.review-q{font-size:.85rem;margin-bottom:8px;color:#555}
.review-choices{display:grid;gap:6px}
.review-choice{background:var(--paper);border:1.5px solid var(--line);padding:8px;border-radius:6px;font-size:.85rem;cursor:pointer;text-align:left;color:var(--ink)}
.review-choice.right{background:#e8f5e9;border-color:var(--good)}
.review-choice.bad{background:#fde8e8;border-color:var(--accent)}
.review-actions{display:flex;gap:6px;margin-top:8px}
.review-actions button{flex:1;padding:8px;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:.8rem;color:#fff}
.btn-remember{background:var(--good)}
.close-btn{background:#888;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;width:100%;margin-top:8px}

.result-msg{margin-top:10px;padding:12px;border-radius:8px;font-weight:700;text-align:center;display:none}
.result-msg.show{display:block}
.result-msg.ok{background:#e8f5e9;color:var(--good)}
.result-msg.ng{background:#fde8e8;color:var(--accent)}

.r5-note{background:#fff8e1;border:1px solid #ffe0a0;padding:8px 12px;border-radius:8px;font-size:.78rem;color:#806000;margin-bottom:10px;line-height:1.5}
.r5-note b{color:#5a4500}

@media (max-width:480px){
  .choices{grid-template-columns:1fr}
  .mode-tabs{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <h1>🎯 高認英語 第2問 攻略</h1>
  <p><span class="badge">短文穴埋め</span>語彙・文法 ・ 詳しい解説つき</p>
</header>

<div class="year-pick" id="yearPick"></div>
<div class="q-tabs" id="qTabs"></div>
<div id="qContainer"></div>

<button class="review-fab" onclick="openReview()">📚 復習リスト<span class="count" id="reviewCount">0</span></button>

<div class="review-modal" id="reviewModal">
  <div class="review-content">
    <h2>📚 復習リスト</h2>
    <div id="reviewBody"></div>
    <button class="close-btn" onclick="closeReview()">閉じる</button>
  </div>
</div>

<script>
const QUESTIONS_DATA = {
  "R7-1": [
    {
      no:1, topic:"夢の実現と忍耐",
      sentence:'In order to make your dreams come true, the most important things are to follow your heart and never <span class="blank">[ 8 ]</span> up. Be patient and keep trying until you succeed.',
      sentenceJa:"夢を実現するために、最も大切なことは自分の心に従い、決してあきらめないことです。忍耐強く、成功するまで挑戦し続けてください。",
      answer:3,
      choices:[
        {t:"catch", ja:"つかまえる"},
        {t:"get",   ja:"得る・なる"},
        {t:"give",  ja:"あたえる"},
        {t:"make",  ja:"作る"}
      ],
      keyWords:[
        {w:"in order to",mean:"〜するために",kana:"インオーダートゥ",ac:"オー"},
        {w:"come true",mean:"実現する",kana:"カムトゥルー",ac:"トゥルー"},
        {w:"follow",mean:"従う",kana:"フォロウ",ac:"フォ"},
        {w:"never",mean:"決して〜ない",kana:"ネヴァー",ac:"ネ"},
        {w:"give up",mean:"あきらめる",kana:"ギブアップ",ac:"ア"},
        {w:"patient",mean:"忍耐強い",kana:"ペイシェント",ac:"ペイ"},
        {w:"keep trying",mean:"挑戦し続ける",kana:"キープトライング",ac:"キー"},
        {w:"succeed",mean:"成功する",kana:"サクシード",ac:"シー"}
      ],
      hints:[
        "<p>まずは英文中の重要な単語・表現の意味を確認しましょう。</p><table class='word-table'><tr><th>英語</th><th>意味</th></tr><tr><td class='en'>in order to ...</td><td class='ja'>〜するために</td></tr><tr><td class='en'>make ... come true</td><td class='ja'>…を実現させる</td></tr><tr><td class='en'>follow your heart</td><td class='ja'>自分の心に従う</td></tr><tr><td class='en'>never</td><td class='ja'>決して〜ない</td></tr><tr><td class='en'>be patient</td><td class='ja'>忍耐強くいる</td></tr><tr><td class='en'>keep -ing</td><td class='ja'>〜し続ける</td></tr><tr><td class='en'>until ...</td><td class='ja'>…するまで</td></tr><tr><td class='en'>succeed</td><td class='ja'>成功する</td></tr></table><p>選択肢の単語の意味も確認しましょう。</p><table class='word-table'><tr><th>英語</th><th>意味</th></tr><tr><td class='en'>catch up</td><td class='ja'>追いつく</td></tr><tr><td class='en'>get up</td><td class='ja'>起きる</td></tr><tr><td class='en'>give up</td><td class='ja'>あきらめる</td></tr><tr><td class='en'>make up</td><td class='ja'>仲直りする・作り上げる</td></tr></table>",
        "<p>テーマは<b>夢の実現</b>です。</p><div class='step'>「自分の心に従い、決して<b>___ up</b>しない」、「忍耐強く、成功するまで<b>挑戦し続ける</b>」と続きます。<span class='think-arrow'>→</span>つまり空所には、<b>「途中でやめない」</b>という意味になる動詞が入ります。</div>",
        "「決して<b>___ up</b>しない」+「忍耐強く挑戦し続ける」。<br><b>up</b>と組み合わせて<b>「あきらめる」</b>になる動詞は、選択肢のうちどれでしょう？"
      ],
      explain:'<p><b>In order to + 動詞の元の形</b>＝<b>「〜するために」</b>という決まった言い方です。<b>to + 動詞</b>だけでも「〜するために」を表せますが、<b>in order to</b>とすると<b>目的</b>がより強調されます。</p><p><b>make your dreams come true</b>＝<b>「夢を実現させる」</b>。<b>make + 目的語 + 動詞の元の形</b>で<b>「（目的語）に〜させる」</b>という形（使役構文）です。<b>come true</b>＝「実現する」（夢・予想・希望が現実になる）。</p><p><b>the most important things are to 〜</b>＝「最も大切なことは〜することだ」。<b>to + 動詞</b>は名詞のように使えて、ここでは<b>「〜すること」</b>と訳します。</p><p><b>follow your heart</b>＝<b>「自分の心に従う」</b>。<b>follow</b>は「ついていく・従う」。</p><p><b>never give up</b>＝<b>「決してあきらめない」</b>。<b>give up</b>は<b>「あきらめる・断念する」</b>という重要熟語です。<b>never</b>（決して〜ない）と組み合わせて強い意志を表します。</p><p><b>Be patient</b>＝<b>「忍耐強くいなさい」</b>（命令文）。<b>patient</b>は形容詞で「忍耐強い」、名詞では「患者」の意味もある多義語です。</p><p><b>keep + 動詞の-ing形</b>＝<b>「〜し続ける」</b>。<b>keep trying</b>＝「挑戦し続ける」。</p><p><b>until 〜</b>＝<b>「〜するまで（ずっと）」</b>。期限・継続の終点を表します。</p><div class="ja-trans"><b>全体訳：</b>夢を実現するために、最も大切なことは自分の心に従い、決してあきらめないことです。忍耐強く、成功するまで挑戦し続けてください。</div>'
    },
    {
      no:2, topic:"人気の劇場",
      sentence:'This theater hosts amazing performances at reasonable ticket prices. The shows are so <span class="blank">[ 9 ]</span> that you have to buy your tickets a month in advance.',
      sentenceJa:"この劇場は手頃なチケット価格で素晴らしい公演を行っています。公演はとても人気があるので、チケットは1か月前に買わなくてはなりません。",
      answer:2,
      choices:[
        {t:"long",     ja:"長い"},
        {t:"popular",  ja:"人気のある"},
        {t:"scary",    ja:"恐ろしい"},
        {t:"realistic",ja:"現実的な"}
      ],
      keyWords:[
        {w:"theater",mean:"劇場",kana:"シアター",ac:"シ"},
        {w:"hosts",mean:"主催する・行う",kana:"ホウスツ",ac:"ホウ"},
        {w:"amazing",mean:"素晴らしい",kana:"アメイジング",ac:"メイ"},
        {w:"performances",mean:"公演",kana:"パフォーマンスィズ",ac:"フォー"},
        {w:"reasonable",mean:"手頃な・妥当な",kana:"リーズナブル",ac:"リー"},
        {w:"so ... that",mean:"とても…なので〜",kana:"ソウザット",ac:"ソウ"},
        {w:"in advance",mean:"前もって",kana:"インアドヴァンス",ac:"ヴァ"}
      ],
      hints:[
        "<p>まずは英文中の重要な単語・表現の意味を確認しましょう。</p><table class='word-table'><tr><th>英語</th><th>意味</th></tr><tr><td class='en'>theater</td><td class='ja'>劇場</td></tr><tr><td class='en'>host</td><td class='ja'>主催する・行う</td></tr><tr><td class='en'>amazing</td><td class='ja'>素晴らしい・驚くべき</td></tr><tr><td class='en'>performance</td><td class='ja'>公演・上演</td></tr><tr><td class='en'>reasonable</td><td class='ja'>手頃な・妥当な</td></tr><tr><td class='en'>so ... that 〜</td><td class='ja'>とても…なので〜</td></tr><tr><td class='en'>have to ...</td><td class='ja'>…しなければならない</td></tr><tr><td class='en'>in advance</td><td class='ja'>前もって・あらかじめ</td></tr></table><p>選択肢の単語の意味も確認しましょう。</p><table class='word-table'><tr><th>英語</th><th>意味</th></tr><tr><td class='en'>long</td><td class='ja'>長い</td></tr><tr><td class='en'>popular</td><td class='ja'>人気のある</td></tr><tr><td class='en'>scary</td><td class='ja'>恐ろしい・怖い</td></tr><tr><td class='en'>realistic</td><td class='ja'>現実的な・写実的な</td></tr></table>",
        "<p>テーマは<b>劇場</b>です。</p><div class='step'>「素晴らしい公演」「手頃な値段」と良い条件が並んでいます。そして「<b>1か月前に予約しないといけない</b>」と続きます。<span class='think-arrow'>→</span>1か月前に予約必須ということは……公演がそれだけ<b>○○だから</b>ですね。</div><div class='step'><b>so ___ that ...</b>＝<b>「とても___なので…だ」</b>という構文。「（その公演は）とても<b>___</b>なので、1か月前に予約しないといけない」と読みます。</div>",

function highlightWord(text, words){
  if(!words || words.length===0) return text;
  const sorted = [...words].sort((a,b)=>b.w.length-a.w.length);
  let result = text;
  sorted.forEach((kw,i)=>{
    const safeWord = kw.w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`\\b(${safeWord})\\b`, 'i');
    if(result.match(regex)){
      const opts = JSON.stringify({m:kw.mean,k:kw.kana,a:kw.ac});
      const escapedOpts = opts.replace(/"/g, '&quot;');
      result = result.replace(regex, `<span class="word" data-opts="${escapedOpts}" onclick="showVwPop(this,event)">$1</span>`);
    }
  });
  return result;
}

    r5NoteHtml = '<div class="r5-note">📝 <b>注意：</b>令和5年度では、この形式は<b>第5問</b>として出題されました。R6以降は<b>第2問</b>になっています。</div>';
  }
  
  // 単語を装飾した文を作る
  const decorated = highlightWord(data.sentence, data.keyWords);
  
  let choicesHtml = '';
  data.choices.forEach((ch,i)=>{
    choicesHtml += `<button class="choice" data-idx="${i}" onclick="pickChoice(${i})">

  c.innerHTML = `
    <div class="qcard">
      ${r5NoteHtml}

      <button class="sentence-play" onclick="playSentence()">🔊 英文を読み上げる</button>
      <div class="sentence" id="sentenceBox">${decorated}</div>
      <div class="choices" id="choicesBox">${choicesHtml}</div>
      <div class="result-msg" id="resultMsg"></div>
      
      <div class="mode-tabs">
        <button class="mode-btn ${currentMode==='hint'?'active':''}" onclick="setMode('hint')">💡 ヒントモード</button>
        <button class="mode-btn ${currentMode==='explain'?'active':''}" onclick="setMode('explain')">📚 詳しい解説</button>
      </div>
      
      <div class="mode-panel ${currentMode==='hint'?'show':''}" id="hintPanel">
        <h3>💡 段階的ヒント</h3>
        <div class="hint-buttons">
          <button class="hint-btn" onclick="showHint(0)">ヒント1</button>
          <button class="hint-btn" onclick="showHint(1)">ヒント2</button>
          <button class="hint-btn" onclick="showHint(2)">ヒント3</button>
        </div>
        ${hintsHtml}
      </div>
      
      <div class="mode-panel ${currentMode==='explain'?'show':''}" id="explainPanel">
        <h3>📚 詳しい解説</h3>
        <div class="explain-box">${data.explain}</div>
      </div>
    </div>
  `;
  
  // 既に解答済みなら復元
  const k = getKey(currentYear, currentQ);
  if(answeredMap[k] !== undefined){
    revealAnswer(answeredMap[k], false);
  }

function setMode(m){
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('hintPanel').classList.toggle('show', m==='hint');
  document.getElementById('explainPanel').classList.toggle('show', m==='explain');
}

function showHint(i){
  const box = document.getElementById('hint'+i);
  box.classList.toggle('show');
}

function pickChoice(i){
  const k = getKey(currentYear, currentQ);
  if(answeredMap[k] !== undefined) return;
  answeredMap[k] = i;
  revealAnswer(i, true);
}

function revealAnswer(picked, showMsg){
  const data = QUESTIONS_DATA[currentYear][currentQ];
  const ans = data.answer - 1;
  const choicesEl = document.getElementById('choicesBox');
  if(!choicesEl) return;
  choicesEl.classList.add('revealed');
  const buttons = choicesEl.querySelectorAll('.choice');
  buttons.forEach((btn, i)=>{
    if(i===ans) btn.classList.add('correct');
    else if(i===picked) btn.classList.add('wrong');
  });
  if(showMsg){
    const msg = document.getElementById('resultMsg');
    if(picked===ans){
      msg.className = 'result-msg ok show';
      msg.textContent = '🎉 正解！ ';
    } else {
      msg.className = 'result-msg ng show';
      msg.textContent = `残念。正解は ${data.answer} 番です。`;
    }
  }
}

// 単語ホバー
let activeWordPop = null;
function showVwPop(el, ev){
  if(ev) ev.stopPropagation();
  if(activeWordPop && activeWordPop !== el){
    closeVwPop(activeWordPop);
  }
  if(el.classList.contains('tapped')){
    closeVwPop(el);
    return;
  }
  el.classList.add('tapped');
  const opts = JSON.parse(el.getAttribute('data-opts').replace(/&quot;/g,'"'));
  const word = el.textContent;
  
  // 既に保存されているか
  const isSaved = savedWords.some(w=>w.w===word);
  
  const pop = document.createElement('span');
  pop.className = 'word-pop show';
  pop.innerHTML = `
    <div class="pop-row">
      <div>
        <div><b>${word}</b> [${opts.k}] ${opts.a?`<span class="accent">▶${opts.a}</span>`:''}</div>
        <div>${opts.m}</div>
      </div>
      <div class="pop-btns">
        <button class="speak" title="この単語を読み上げる">🔊</button>
        <button class="${isSaved?'saved':'save'}">${isSaved?'✓':'保存'}</button>
      </div>
    </div>
  `;
  // ボタンのイベントをDOM経由でバインド（単語にクォートが含まれていてもOK）
  const speakBtn = pop.querySelector('button.speak');
  speakBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    speakWord(word);
  });
  const saveBtn = pop.querySelector('button.save, button.saved');
  saveBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    if(saveBtn.classList.contains('saved')) return;
    saveWord(word, opts.m, opts.k, saveBtn);
  });
  el.appendChild(pop);
  activeWordPop = el;
}

function closeVwPop(el){
  el.classList.remove('tapped');
  const pop = el.querySelector('.word-pop');
  if(pop) pop.remove();
  if(activeWordPop===el) activeWordPop = null;
}

document.addEventListener('click', (e)=>{
  if(activeWordPop && !activeWordPop.contains(e.target)){
    closeVwPop(activeWordPop);
  }
});

function saveWord(w, m, k, btn){
  if(savedWords.some(x=>x.w===w)){
    return;
  }
  // 現在の問題の選択肢から問題情報を生成
  const data = QUESTIONS_DATA[currentYear][currentQ];
  savedWords.push({w, m, k, year:currentYear, qNo:data.no});
  btn.textContent = '✓';
  btn.className = 'saved';
  document.getElementById('reviewCount').textContent = savedWords.length;
}

// 音声合成
let voices = [];
let currentSpeech = null;

function loadVoices(){
  voices = window.speechSynthesis.getVoices();
}
if('speechSynthesis' in window){
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

function pickVoice(){
  if(voices.length===0) loadVoices();
  const enVoices = voices.filter(v => /^en(-|$)/i.test(v.lang));
  if(enVoices.length===0) return voices[0];
  
  // 1) 明るい女性声として知られる名前を優先（プラットフォーム横断）
  // Aria/Jenny: Microsoft Edge, Samantha: macOS/iOS, Karen/Tessa: 女性英語声
  // Google系のen-USは標準で女性声がデフォルト
  const brightNames = /Aria|Jenny|Samantha|Karen|Tessa|Nicky|Allison|Ava|Zoe|Joanna|Salli|Kimberly|Amy/i;
  const brightFemale = enVoices.find(v => brightNames.test(v.name));
  if(brightFemale) return brightFemale;
  
  // 2) 名前に female / woman が明示されている声
  const explicitFemale = enVoices.find(v => /female|woman/i.test(v.name));
  if(explicitFemale) return explicitFemale;
  
  // 3) 男性とわかる名前を除外して、残った中で en-US を優先
  const maleNames = /male|man|David|Daniel|Alex|Mark|George|James|Tom|Fred|Bruce|Albert|Ralph|Reed|Rocko/i;
  const notMaleUS = enVoices.find(v => /en-US/i.test(v.lang) && !maleNames.test(v.name));
  if(notMaleUS) return notMaleUS;
  
  // 4) 男性除外の英語声
  const notMale = enVoices.find(v => !maleNames.test(v.name));
  if(notMale) return notMale;
  
  // 5) フォールバック
  return enVoices[0];
}

function playSentence(){
  if(!('speechSynthesis' in window)){
    alert('お使いのブラウザは音声読み上げに対応していません');
    return;
  }
  stopAllPlay();
  const data = QUESTIONS_DATA[currentYear][currentQ];
  // タグを除去して読み上げ用テキストを作る
  let text = data.sentence.replace(/<[^>]+>/g, ' ').replace(/\[\s*\d+\s*\]/g, 'blank').replace(/\s+/g, ' ').trim();
  const u = new SpeechSynthesisUtterance(text);
  const v = pickVoice();
  if(v) u.voice = v;
  u.lang = 'en-US';
  u.rate = 0.9;
  u.pitch = 1.15;
  currentSpeech = u;
  speechSynthesis.speak(u);
}

function speakWord(word){
  if(!('speechSynthesis' in window)){
    alert('お使いのブラウザは音声読み上げに対応していません');
    return;
  }
  stopAllPlay();
  const u = new SpeechSynthesisUtterance(word);
  const v = pickVoice();
  if(v) u.voice = v;
  u.lang = 'en-US';
  u.rate = 0.85;
  u.pitch = 1.15;
  currentSpeech = u;
  speechSynthesis.speak(u);
}

function stopAllPlay(){
  if('speechSynthesis' in window){
    speechSynthesis.cancel();
  }
  currentSpeech = null;
}

// 復習リスト
function openReview(){
  const body = document.getElementById('reviewBody');
  if(savedWords.length===0){
    body.innerHTML = '<p style="text-align:center;color:#888;padding:20px">まだ単語が保存されていません。<br>英文中の<span style="color:var(--accent2);text-decoration:underline">下線つきの単語</span>をタップして「保存」ボタンを押してください。</p>';
  } else {
    body.innerHTML = savedWords.map((w,i)=>`
      <div class="review-card">
        <div class="review-word">${w.w}</div>
        <div class="review-q">[${w.k}] ${w.m}</div>
        <div style="font-size:.75rem;color:#888;">令和${w.year[1]}年 第${w.year[3]}回 問${w.qNo}より</div>
        <div class="review-actions">
          <button class="btn-remember" onclick="removeWord(${i})">✓ 覚えた</button>
        </div>
      </div>
    `).join('');
  }
  document.getElementById('reviewModal').classList.add('show');
}
function closeReview(){
  document.getElementById('reviewModal').classList.remove('show');
}
function removeWord(i){
  savedWords.splice(i, 1);
  document.getElementById('reviewCount').textContent = savedWords.length;
  openReview();
}

// 初期化
renderYearPick();
renderTabs();
renderQuestion();
</script>
</body>
</html>
